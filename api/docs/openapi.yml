openapi: "3.1.0"
info:
  title: Taillight API
  description: |
    Taillight is a centralized srvlog and application-log viewer with real-time
    streaming, analysis reports, and rsyslog/Juniper integration.
  version: "1.0.0"
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: /api/v1
    description: Default API prefix

tags:
  - name: Auth
    description: Authentication, user management, and API keys
  - name: Srvlog
    description: Srvlog event queries and streaming
  - name: Srvlog Metadata
    description: Distinct values for srvlog filter dropdowns
  - name: AppLog
    description: Application log queries, streaming, and ingestion
  - name: AppLog Metadata
    description: Distinct values for applog filter dropdowns
  - name: Netlog
    description: Netlog (network device) event queries and streaming
  - name: Netlog Metadata
    description: Distinct values for netlog filter dropdowns
  - name: Stats
    description: Srvlog, Netlog, and AppLog volume and summary statistics
  - name: Juniper
    description: Juniper syslog reference lookups
  - name: Rsyslog
    description: Rsyslog daemon statistics
  - name: Metrics
    description: Taillight internal metrics
  - name: Notifications
    description: Alert channels, rules, and delivery log
  - name: Device
    description: Per-host device detail views
  - name: Analysis
    description: LLM-generated analysis reports
  - name: Health
    description: Health check

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
security:
  - session: []
  - apiKey: []

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  # ── Auth ────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: Log in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Successful login (sets `tl_session` cookie)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      summary: Log out
      responses:
        "200":
          description: Session cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"

  /auth/me:
    get:
      operationId: me
      tags: [Auth]
      summary: Current user info
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me/email:
    patch:
      operationId: updateEmail
      tags: [Auth]
      summary: Update own email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me/preferences:
    patch:
      operationId: updatePreferences
      tags: [Auth]
      summary: Update user preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [preferences]
              properties:
                preferences:
                  type: object
                  description: Arbitrary JSON preferences object
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/keys:
    get:
      operationId: listKeys
      tags: [Auth]
      summary: List API keys
      responses:
        "200":
          description: API key list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/APIKeyInfo"
    post:
      operationId: createKey
      tags: [Auth]
      summary: Create API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKeyRequest"
      responses:
        "201":
          description: Key created (full key shown once)
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                    description: Full API key — only shown at creation time
                  key_info:
                    $ref: "#/components/schemas/APIKeyInfo"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/keys/{id}:
    delete:
      operationId: revokeKey
      tags: [Auth]
      summary: Revoke an API key
      parameters:
        - $ref: "#/components/parameters/UUID"
      responses:
        "200":
          description: Key revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/users:
    get:
      operationId: listUsers
      tags: [Auth]
      summary: List users (admin)
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminUser"
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/users/{id}/active:
    patch:
      operationId: setUserActive
      tags: [Auth]
      summary: Activate / deactivate user (admin)
      parameters:
        - $ref: "#/components/parameters/UUID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [active]
              properties:
                active:
                  type: boolean
      responses:
        "200":
          description: Status changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/users/{id}/password:
    patch:
      operationId: updateUserPassword
      tags: [Auth]
      summary: Update user password
      description: |
        Self-change requires `current_password` in the request body. Admin can
        reset without it. Returns 403 for LDAP-managed users (password changes
        must go through the LDAP directory).
      parameters:
        - $ref: "#/components/parameters/UUID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  minLength: 8
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/sessions/revoke-all:
    post:
      operationId: logoutAll
      tags: [Auth]
      summary: Revoke all sessions for current user
      description: Logs out all sessions including the current one and clears the session cookie.
      responses:
        "200":
          description: All sessions revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/users/{id}/revoke-sessions:
    post:
      operationId: revokeUserSessions
      tags: [Auth]
      summary: Revoke all sessions for a user (admin)
      parameters:
        - $ref: "#/components/parameters/UUID"
      responses:
        "200":
          description: User sessions revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ── Srvlog ──────────────────────────────────────────────────────────────
  /srvlog:
    get:
      operationId: listSrvlog
      tags: [Srvlog]
      summary: List srvlog events
      parameters:
        - $ref: "#/components/parameters/SrvlogHostname"
        - $ref: "#/components/parameters/SrvlogProgramname"
        - $ref: "#/components/parameters/SyslogTag"
        - $ref: "#/components/parameters/SrvlogMsgID"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/FromHostIP"
        - $ref: "#/components/parameters/Severity"
        - $ref: "#/components/parameters/SeverityMax"
        - $ref: "#/components/parameters/Facility"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated srvlog events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SrvlogEvent"
                  cursor:
                    type: string
                    nullable: true
                  has_more:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"

  /srvlog/{id}:
    get:
      operationId: getSrvlog
      tags: [Srvlog]
      summary: Get single srvlog event
      parameters:
        - $ref: "#/components/parameters/IntID"
      responses:
        "200":
          description: Srvlog event
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SrvlogEvent"
        "404":
          $ref: "#/components/responses/NotFound"

  /srvlog/stream:
    get:
      operationId: streamSrvlog
      tags: [Srvlog]
      summary: Stream srvlog events (SSE)
      description: |
        Server-Sent Events stream. Backfills up to 100 recent events on
        connect, then pushes new events in real time.

        - Event name: `srvlog`
        - Heartbeat every 15 s: `event: heartbeat`
      parameters:
        - $ref: "#/components/parameters/SrvlogHostname"
        - $ref: "#/components/parameters/SrvlogProgramname"
        - $ref: "#/components/parameters/SyslogTag"
        - $ref: "#/components/parameters/SrvlogMsgID"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/FromHostIP"
        - $ref: "#/components/parameters/Severity"
        - $ref: "#/components/parameters/SeverityMax"
        - $ref: "#/components/parameters/Facility"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - name: lastEventId
          in: query
          schema:
            type: string
          description: Resume from this event ID (alternative to `Last-Event-ID` header)
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}

  # ── Srvlog Metadata ─────────────────────────────────────────────────────
  /srvlog/meta/hosts:
    get:
      operationId: srvlogHosts
      tags: [Srvlog Metadata]
      summary: Distinct hostnames
      responses:
        "200":
          $ref: "#/components/responses/StringList"

  /srvlog/meta/programs:
    get:
      operationId: srvlogPrograms
      tags: [Srvlog Metadata]
      summary: Distinct program names
      responses:
        "200":
          $ref: "#/components/responses/StringList"

  /srvlog/meta/facilities:
    get:
      operationId: srvlogFacilities
      tags: [Srvlog Metadata]
      summary: Facility codes in use
      responses:
        "200":
          description: List of integer facility codes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: integer

  /srvlog/meta/tags:
    get:
      operationId: srvlogTags
      tags: [Srvlog Metadata]
      summary: Distinct srvlog tags
      responses:
        "200":
          $ref: "#/components/responses/StringList"

  # ── Srvlog Stats ──────────────────────────────────────────────────────
  /srvlog/stats/volume:
    get:
      operationId: srvlogVolume
      tags: [Stats]
      summary: Srvlog volume over time
      parameters:
        - $ref: "#/components/parameters/Interval"
        - $ref: "#/components/parameters/Range"
      responses:
        "200":
          description: Volume buckets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/VolumeBucket"

  /srvlog/stats/severity-volume:
    get:
      operationId: srvlogSeverityVolume
      tags: [Stats]
      summary: Srvlog severity volume over time
      parameters:
        - $ref: "#/components/parameters/Interval"
        - $ref: "#/components/parameters/Range"
      responses:
        "200":
          description: Severity volume buckets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SeverityVolumeBucket"

  /srvlog/stats/summary:
    get:
      operationId: srvlogSummary
      tags: [Stats]
      summary: Srvlog summary
      parameters:
        - $ref: "#/components/parameters/Range"
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SrvlogSummary"

  /srvlog/device/{hostname}:
    get:
      operationId: getSrvlogDeviceSummary
      tags: [Device]
      summary: Srvlog device detail
      description: Aggregated summary for a single srvlog device by hostname.
      parameters:
        - name: hostname
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/DeviceSummary"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Netlog ─────────────────────────────────────────────────────────────
  /netlog:
    get:
      operationId: listNetlog
      tags: [Netlog]
      summary: List netlog events
      parameters:
        - $ref: "#/components/parameters/SrvlogHostname"
        - $ref: "#/components/parameters/SrvlogProgramname"
        - $ref: "#/components/parameters/SyslogTag"
        - $ref: "#/components/parameters/SrvlogMsgID"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/FromHostIP"
        - $ref: "#/components/parameters/Severity"
        - $ref: "#/components/parameters/SeverityMax"
        - $ref: "#/components/parameters/Facility"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated netlog events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/NetlogEvent"
                  cursor:
                    type: string
                    nullable: true
                  has_more:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"

  /netlog/{id}:
    get:
      operationId: getNetlog
      tags: [Netlog]
      summary: Get single netlog event
      parameters:
        - $ref: "#/components/parameters/IntID"
      responses:
        "200":
          description: Netlog event with optional Juniper reference
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: "#/components/schemas/NetlogEvent"
                      - type: object
                        properties:
                          juniper_ref:
                            type: array
                            items:
                              $ref: "#/components/schemas/JuniperRef"
        "404":
          $ref: "#/components/responses/NotFound"

  /netlog/stream:
    get:
      operationId: streamNetlog
      tags: [Netlog]
      summary: Stream netlog events (SSE)
      description: |
        Server-Sent Events stream. Backfills up to 100 recent events on
        connect, then pushes new events in real time.

        - Event name: `netlog`
        - Heartbeat every 15 s: `event: heartbeat`
      parameters:
        - $ref: "#/components/parameters/SrvlogHostname"
        - $ref: "#/components/parameters/SrvlogProgramname"
        - $ref: "#/components/parameters/SyslogTag"
        - $ref: "#/components/parameters/SrvlogMsgID"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/FromHostIP"
        - $ref: "#/components/parameters/Severity"
        - $ref: "#/components/parameters/SeverityMax"
        - $ref: "#/components/parameters/Facility"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - name: lastEventId
          in: query
          schema:
            type: string
          description: Resume from this event ID (alternative to `Last-Event-ID` header)
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}

  # ── Netlog Metadata ─────────────────────────────────────────────────────
  /netlog/meta/hosts:
    get:
      operationId: netlogHosts
      tags: [Netlog Metadata]
      summary: Distinct hostnames
      responses:
        "200":
          $ref: "#/components/responses/StringList"

  /netlog/meta/programs:
    get:
      operationId: netlogPrograms
      tags: [Netlog Metadata]
      summary: Distinct program names
      responses:
        "200":
          $ref: "#/components/responses/StringList"

  /netlog/meta/facilities:
    get:
      operationId: netlogFacilities
      tags: [Netlog Metadata]
      summary: Facility codes in use
      responses:
        "200":
          description: List of integer facility codes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: integer

  /netlog/meta/tags:
    get:
      operationId: netlogTags
      tags: [Netlog Metadata]
      summary: Distinct netlog tags
      responses:
        "200":
          $ref: "#/components/responses/StringList"

  # ── Netlog Stats ──────────────────────────────────────────────────────
  /netlog/stats/volume:
    get:
      operationId: netlogVolume
      tags: [Stats]
      summary: Netlog volume over time
      parameters:
        - $ref: "#/components/parameters/Interval"
        - $ref: "#/components/parameters/Range"
      responses:
        "200":
          description: Volume buckets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/VolumeBucket"

  /netlog/stats/severity-volume:
    get:
      operationId: netlogSeverityVolume
      tags: [Stats]
      summary: Netlog severity volume over time
      parameters:
        - $ref: "#/components/parameters/Interval"
        - $ref: "#/components/parameters/Range"
      responses:
        "200":
          description: Severity volume buckets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SeverityVolumeBucket"

  /netlog/stats/summary:
    get:
      operationId: netlogSummary
      tags: [Stats]
      summary: Netlog summary
      parameters:
        - $ref: "#/components/parameters/Range"
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SrvlogSummary"

  /netlog/device/{hostname}:
    get:
      operationId: getNetlogDeviceSummary
      tags: [Device]
      summary: Netlog device detail
      description: Aggregated summary for a single network device by hostname.
      parameters:
        - name: hostname
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/DeviceSummary"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Juniper ─────────────────────────────────────────────────────────────
  /juniper/lookup:
    get:
      operationId: juniperLookup
      tags: [Juniper]
      summary: Juniper syslog reference lookup
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
          description: Juniper message ID to look up
      responses:
        "200":
          description: Matching references
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/JuniperRef"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Rsyslog Stats ──────────────────────────────────────────────────────
  /rsyslog/stats/summary:
    get:
      operationId: rsyslogSummary
      tags: [Rsyslog]
      summary: Rsyslog daemon summary
      parameters:
        - $ref: "#/components/parameters/Range"
      responses:
        "200":
          description: Rsyslog statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/RsyslogSummary"

  /rsyslog/stats/volume:
    get:
      operationId: rsyslogVolume
      tags: [Rsyslog]
      summary: Rsyslog time-series stats
      parameters:
        - $ref: "#/components/parameters/Interval"
        - $ref: "#/components/parameters/Range"
        - name: field
          in: query
          schema:
            type: string
            default: submitted
          description: Metric field to retrieve
      responses:
        "200":
          description: Time-series data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/NamedTimeSeries"

  # ── Taillight Metrics ──────────────────────────────────────────────────
  /metrics/summary:
    get:
      operationId: metricsSummary
      tags: [Metrics]
      summary: Taillight internal metrics
      parameters:
        - $ref: "#/components/parameters/Range"
      responses:
        "200":
          description: Current metric values
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/TaillightMetrics"

  /metrics/volume:
    get:
      operationId: metricsVolume
      tags: [Metrics]
      summary: Taillight metrics time-series
      parameters:
        - $ref: "#/components/parameters/Interval"
        - $ref: "#/components/parameters/Range"
        - name: field
          in: query
          schema:
            type: string
            default: events_broadcast
          description: Metric field to retrieve
      responses:
        "200":
          description: Time-series data
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TimeSeries"

  # ── AppLog ─────────────────────────────────────────────────────────────
  /applog:
    get:
      operationId: listAppLog
      tags: [AppLog]
      summary: List application log events
      parameters:
        - $ref: "#/components/parameters/AppLogService"
        - $ref: "#/components/parameters/AppLogComponent"
        - $ref: "#/components/parameters/AppLogHost"
        - $ref: "#/components/parameters/AppLogLevel"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated applog events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AppLogEvent"
                  cursor:
                    type: string
                    nullable: true
                  has_more:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"

  /applog/{id}:
    get:
      operationId: getAppLog
      tags: [AppLog]
      summary: Get single application log event
      parameters:
        - $ref: "#/components/parameters/IntID"
      responses:
        "200":
          description: Application log event
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AppLogEvent"
        "404":
          $ref: "#/components/responses/NotFound"

  /applog/stream:
    get:
      operationId: streamAppLog
      tags: [AppLog]
      summary: Stream application log events (SSE)
      description: |
        Server-Sent Events stream. Backfills up to 100 recent events on
        connect, then pushes new events in real time.

        - Event name: `applog`
        - Heartbeat every 15 s: `event: heartbeat`
      parameters:
        - $ref: "#/components/parameters/AppLogService"
        - $ref: "#/components/parameters/AppLogComponent"
        - $ref: "#/components/parameters/AppLogHost"
        - $ref: "#/components/parameters/AppLogLevel"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - name: lastEventId
          in: query
          schema:
            type: string
          description: Resume from this event ID (alternative to `Last-Event-ID` header)
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}

  /applog/ingest:
    post:
      operationId: ingestAppLog
      tags: [AppLog]
      summary: Ingest application log batch
      description: |
        Accepts up to 1 000 log entries per request (max 5 MB body).
        Entries are inserted atomically and broadcast to SSE clients.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequest"
      responses:
        "202":
          description: Batch accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: integer
                    description: Number of entries inserted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: Request body exceeds 5 MB
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── AppLog Metadata ─────────────────────────────────────────────────────
  /applog/meta/services:
    get:
      operationId: applogServices
      tags: [AppLog Metadata]
      summary: Distinct service names
      responses:
        "200":
          $ref: "#/components/responses/StringList"

  /applog/meta/components:
    get:
      operationId: applogComponents
      tags: [AppLog Metadata]
      summary: Distinct component names
      responses:
        "200":
          $ref: "#/components/responses/StringList"

  /applog/meta/hosts:
    get:
