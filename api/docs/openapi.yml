        context:
          type: object
          additionalProperties:
            type: string
          description: Extra extraction context, e.g. the owning device for an interface

    NetboxLookup:
      type: object
      properties:
        entity:
          $ref: "#/components/schemas/NetboxEntity"
        found:
          type: boolean
        data:
          type: object
          additionalProperties: true
          description: |
            Tagged union keyed by entity type — exactly one of `device`, `ip`,
            `prefix`, `asn`, or `interface` is set; omitted when not found.
        error:
          type: string
          description: Per-entity lookup failure; omitted on success
