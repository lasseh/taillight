          type: integer
          minimum: 0
          maximum: 6
          nullable: true
          description: 0=Sun..6=Sat; omitted for daily
        day_of_month:
          type: integer
          minimum: 1
          maximum: 28
          nullable: true
          description: Omitted for daily/weekly
        time_of_day:
          type: string
          example: "08:00"
        timezone:
          type: string
          example: "UTC"
        event_kinds:
          type: array
          items:
            type: string
            enum: [srvlog, netlog, applog]
        severity_max:
          type: integer
          minimum: 0
          maximum: 7
          nullable: true
          description: Only include events at or below this severity; omitted = all
        hostname:
          type: string
          description: Restrict to one hostname; omitted = all hosts
        top_n:
          type: integer
          description: Number of top issues to include (default 25)
