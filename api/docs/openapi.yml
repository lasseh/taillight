  # ── Analysis ────────────────────────────────────────────────────────────
  /analysis/reports:
    get:
      operationId: listReports
      tags: [Analysis]
      summary: List analysis reports
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
      responses:
        "200":
          description: Report list (without full body)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReportSummary"

  /analysis/reports/latest:
    get:
      operationId: latestReport
      tags: [Analysis]
      summary: Most recent report
      responses:
        "200":
          description: Full report
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Report"
        "404":
          $ref: "#/components/responses/NotFound"

  /analysis/reports/{id}:
    get:
      operationId: getReport
      tags: [Analysis]
      summary: Get report by ID
      parameters:
        - $ref: "#/components/parameters/IntID"
      responses:
        "200":
          description: Full report
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Report"
        "404":
          $ref: "#/components/responses/NotFound"

  /analysis/reports/trigger:
    post:
      operationId: triggerReport
      tags: [Analysis]
      summary: Trigger analysis run
      description: Manually starts an LLM analysis. May take several minutes.
      responses:
        "200":
          description: Report generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
