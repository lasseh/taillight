                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/JuniperRef"
        "400":
          $ref: "#/components/responses/BadRequest"

  /juniper/ref/upload:
    post:
      operationId: uploadJuniperRef
      x-required-scope: admin
      tags: [Juniper]
      summary: Upload Juniper syslog reference XLSX (admin)
      description: |
        Parses the Juniper-published syslog reference XLSX and upserts the
        rows. `os` selects the target OS and may also be supplied as a query
        parameter. Max body size 10 MiB.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, os]
              properties:
                file:
                  type: string
                  format: binary
                  description: Juniper syslog reference XLSX
                os:
                  type: string
                  enum: [junos, junos-evolved]
      responses:
        "200":
          description: Upload result
          content:
            application/json:
              schema:
                type: object
                properties:
                  parsed:
                    type: integer
                    description: Reference rows parsed from the file
                  upserted:
                    type: integer
                    description: Rows inserted or updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          description: Request body exceeds 10 MiB
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

