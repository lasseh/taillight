              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Health ──────────────────────────────────────────────────────────────
  /health:
    servers:
      - url: /
        description: Health endpoint is at root, not under /api/v1
    get:
      operationId: health
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
        "503":
          description: Unhealthy (database unreachable)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: unhealthy

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    session:
      type: apiKey
      in: cookie
      name: tl_session
      description: Session cookie set by POST /auth/login
    apiKey:
      type: http
      scheme: bearer
      description: "API key obtained from POST /auth/keys"

  # ── Parameters ──────────────────────────────────────────────────────────
  parameters:
    UUID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    IntID:
      name: id
      in: path
      required: true
      schema:
        type: integer

    Cursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Keyset pagination cursor

    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100

    Search:
      name: search
      in: query
      schema:
        type: string
        maxLength: 500
      description: Case-insensitive substring search on message text

    From:
      name: from
      in: query
      schema:
        type: string
        format: date-time
      description: Start time (inclusive)

    To:
      name: to
      in: query
      schema:
        type: string
        format: date-time
      description: End time (inclusive)

    Interval:
      name: interval
      in: query
      schema:
        type: string
        enum: [1m, 5m, 15m, 30m, 1h, 6h, 1d]
        default: "1h"

    Range:
      name: range
      in: query
      schema:
        type: string
        enum: [1h, 6h, 12h, 24h, 7d, 30d]
        default: "24h"

    # Srvlog-specific
    SrvlogHostname:
      name: hostname
      in: query
      schema:
        type: string
        maxLength: 500

    SrvlogProgramname:
      name: programname
      in: query
      schema:
        type: string
        maxLength: 500

    SyslogTag:
      name: syslogtag
      in: query
      schema:
        type: string
        maxLength: 500

    SrvlogMsgID:
      name: msgid
      in: query
      schema:
        type: string
        maxLength: 500

    FromHostIP:
      name: fromhost_ip
      in: query
      schema:
        type: string
        format: ipv4
      description: Source IP address

    Severity:
      name: severity
      in: query
      schema:
        type: integer
        minimum: 0
        maximum: 7
      description: Exact severity level (0=emerg .. 7=debug)

    SeverityMax:
      name: severity_max
      in: query
      schema:
        type: integer
        minimum: 0
        maximum: 7
      description: Maximum severity level (returns this level and lower numeric values)

    Facility:
      name: facility
      in: query
      schema:
        type: integer
        minimum: 0
        maximum: 23

    # AppLog-specific
    AppLogService:
      name: service
      in: query
      schema:
        type: string
        maxLength: 500

    AppLogComponent:
      name: component
      in: query
      schema:
        type: string
        maxLength: 500

    AppLogHost:
      name: host
      in: query
      schema:
        type: string
        maxLength: 500

    AppLogLevel:
      name: level
      in: query
      schema:
        type: string
        enum: [DEBUG, INFO, WARN, ERROR, FATAL]
      description: Minimum log level (returns this level and above)

  # ── Responses ───────────────────────────────────────────────────────────
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    StringList:
      description: List of strings
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  type: string

  # ── Schemas ─────────────────────────────────────────────────────────────
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

    StatusOK:
      type: object
      properties:
        status:
          type: string
          example: ok

    # ── Auth ──────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    UserInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          nullable: true
        is_admin:
          type: boolean
        is_active:
          type: boolean
        auth_source:
          type: string
          description: '"local" for bcrypt-authenticated users, "ldap" for LDAP-authenticated users'
          enum: [local, ldap]
        gravatar_url:
          type: string
        preferences:
          type: object
          description: Arbitrary user preferences JSON
        created_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time
          nullable: true

    UserResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserInfo"

    AdminUser:
      description: Same shape as UserInfo (ListUsers uses the same serializer)
      $ref: "#/components/schemas/UserInfo"

    CreateKeyRequest:
      type: object
      required: [name, scopes]
      properties:
        name:
          type: string
          maxLength: 255
        scopes:
          type: array
          items:
            type: string
            enum: [read, ingest, admin]
          description: At least one scope required
        expires_at:
          type: string
          format: date-time
          nullable: true

    APIKeyInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
        key_prefix:
          type: string
        scopes:
          type: array
          items:
            type: string
            enum: [read, ingest, admin]
        expires_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    # ── Srvlog ────────────────────────────────────────────────────────────
    SrvlogEvent:
      type: object
      properties:
        id:
          type: integer
        received_at:
          type: string
          format: date-time
        reported_at:
          type: string
          format: date-time
        hostname:
          type: string
        fromhost_ip:
          type: string
        programname:
          type: string
        msgid:
          type: string
        severity:
          type: integer
          minimum: 0
          maximum: 7
        severity_label:
          type: string
          enum: [emerg, alert, crit, err, warning, notice, info, debug]
        facility:
          type: integer
          minimum: 0
          maximum: 23
        facility_label:
          type: string
        syslogtag:
          type: string
        structured_data:
          type: string
          nullable: true
        message:
          type: string
        raw_message:
          type: string
          nullable: true

    # ── Netlog ────────────────────────────────────────────────────────────
    NetlogEvent:
      type: object
      properties:
        id:
          type: integer
        received_at:
          type: string
          format: date-time
        reported_at:
          type: string
          format: date-time
        hostname:
          type: string
        fromhost_ip:
          type: string
        programname:
          type: string
        msgid:
          type: string
        severity:
          type: integer
          minimum: 0
          maximum: 7
        severity_label:
          type: string
          enum: [emerg, alert, crit, err, warning, notice, info, debug]
        facility:
          type: integer
          minimum: 0
          maximum: 23
        facility_label:
          type: string
        syslogtag:
          type: string
        structured_data:
          type: string
          nullable: true
        message:
          type: string
        raw_message:
          type: string
          nullable: true

    # ── AppLog ────────────────────────────────────────────────────────────
    AppLogEvent:
      type: object
      properties:
        id:
          type: integer
        received_at:
          type: string
          format: date-time
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          enum: [DEBUG, INFO, WARN, ERROR, FATAL]
        service:
          type: string
        component:
          type: string
          nullable: true
        host:
          type: string
          nullable: true
        msg:
          type: string
        source:
          type: string
          nullable: true
        attrs:
          type: object
          nullable: true
          additionalProperties: true

    IngestRequest:
      type: object
      required: [logs]
      properties:
        logs:
          type: array
          maxItems: 1000
          items:
            $ref: "#/components/schemas/IngestEntry"

    IngestEntry:
      type: object
      required: [timestamp, level, msg, service, host]
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          description: "DEBUG, INFO, WARN, ERROR, or FATAL (also accepts TRACE, WARNING, CRITICAL, PANIC)"
        msg:
          type: string
          maxLength: 65536
        service:
          type: string
          maxLength: 128
        component:
          type: string
          maxLength: 128
        host:
          type: string
          maxLength: 256
        source:
          type: string
          maxLength: 256
        attrs:
          type: object
          additionalProperties: true

    # ── Stats ─────────────────────────────────────────────────────────────
    VolumeBucket:
      type: object
      properties:
        time:
          type: string
          format: date-time
        total:
          type: integer
        by_host:
          type: object
          additionalProperties:
            type: integer

    SeverityVolumeBucket:
      type: object
      properties:
        time:
          type: string
          format: date-time
        total:
          type: integer
        by_severity:
          type: object
          additionalProperties:
            type: integer

    SrvlogSummary:
      type: object
      properties:
        total:
          type: integer
        trend:
          type: number
          format: double
          description: Percentage change vs previous period
        errors:
          type: integer
        warnings:
          type: integer
        severity_breakdown:
          type: array
          items:
            type: object
            properties:
              severity:
                type: integer
              label:
                type: string
              count:
                type: integer
              pct:
                type: number
                format: double
        top_hosts:
          type: array
          items:
            $ref: "#/components/schemas/NamedCount"

    AppLogSummary:
      type: object
      properties:
        total:
          type: integer
        trend:
          type: number
          format: double
        errors:
          type: integer
        warnings:
          type: integer
        level_breakdown:
          type: array
          items:
            type: object
            properties:
              level:
                type: string
              count:
                type: integer
              pct:
                type: number
                format: double
        top_services:
          type: array
          items:
