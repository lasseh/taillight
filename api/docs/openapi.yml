          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
      responses:
        "200":
          description: Report list (without full body)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ReportSummary"

    post:
      operationId: createReport
      x-required-scope: admin
      tags: [Analysis]
      summary: Queue a new analysis run
      description: |
        Inserts a pending report row and queues it for processing by the worker.
        Returns immediately with the new row (status="pending"); the worker
        picks it up asynchronously. Subsequent rapid clicks for the same feed
        return 409 because of the partial unique index on (feed, period_end).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [feed]
              properties:
                feed:
                  type: string
                  enum: [netlog, srvlog, all]
                  description: "'all' = all syslog feeds (srvlog + netlog); applog is excluded by design"
                prompt_mode:
                  type: string
                  enum: [daily, weekly, incident]
                  default: daily
                  description: Prompt set framing the report
                period_minutes:
                  type: integer
                  minimum: 5
                  maximum: 43200
                  description: |
                    Analysis window override in minutes. Omitted/zero picks a
                    mode-aware default (24h for daily/weekly, 60min for incident).
                hosts:
                  type: array
                  items:
                    type: string
                  description: |
                    Restrict the report to these hostnames. Empty/missing means
                    all hosts on the feed; unknown names are rejected with 400.
      responses:
        "201":
          description: Report queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Report"
        "400":
          description: Invalid feed or feed unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Duplicate active report for feed+period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Worker queue full
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Analysis not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analysis/reports/{slug}:
    get:
      operationId: getReport
      x-required-scope: read
      tags: [Analysis]
      summary: Get report by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full report
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Report"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteReport
      x-required-scope: admin
      tags: [Analysis]
      summary: Delete a report by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /analysis/reports/{slug}/print:
    get:
      operationId: printReport
      x-required-scope: read
      tags: [Analysis]
      summary: Print-ready HTML for a completed report
      description: |
        Returns a complete standalone HTML document (not the JSON envelope)
        styled for browser print-to-PDF. The frontend loads it into a hidden
        iframe and calls print(). Only completed reports are printable.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Standalone HTML document
          content:
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Report is not completed yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /analysis/hosts:
    get:
      operationId: listAnalysisHosts
      x-required-scope: read
      tags: [Analysis]
      summary: Hosts available for analysis scoping
      description: |
        Known hostnames for the given feed, used by the create-report host
        picker. Intentionally minimal — no per-host stats.
      parameters:
        - name: feed
          in: query
          required: true
          schema:
            type: string
            enum: [netlog, srvlog, all]
      responses:
        "200":
          description: Host entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AnalysisHostEntry"
        "400":
          $ref: "#/components/responses/BadRequest"

  /analysis/schedules:
    get:
      operationId: listAnalysisSchedules
      x-required-scope: read
      tags: [Analysis]
      summary: List recurring analysis schedules
      responses:
        "200":
          description: Schedule list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AnalysisSchedule"
    post:
      operationId: createAnalysisSchedule
      x-required-scope: admin
      tags: [Analysis]
      summary: Create a recurring analysis schedule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisSchedule"
      responses:
        "201":
          description: Schedule created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AnalysisSchedule"
        "400":
          $ref: "#/components/responses/BadRequest"

  /analysis/schedules/{id}:
    get:
      operationId: getAnalysisSchedule
      x-required-scope: read
      tags: [Analysis]
      summary: Get a schedule by ID
      parameters:
        - $ref: "#/components/parameters/IntID"
      responses:
        "200":
          description: Schedule
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AnalysisSchedule"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateAnalysisSchedule
      x-required-scope: admin
      tags: [Analysis]
      summary: Update a schedule
      parameters:
        - $ref: "#/components/parameters/IntID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisSchedule"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/AnalysisSchedule"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteAnalysisSchedule
      x-required-scope: admin
      tags: [Analysis]
      summary: Delete a schedule
      parameters:
        - $ref: "#/components/parameters/IntID"
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /analysis/schedules/{id}/run:
    post:
      operationId: runAnalysisSchedule
      x-required-scope: admin
      tags: [Analysis]
      summary: Run a schedule immediately
      description: Enqueues a one-off run for the given schedule.
      parameters:
        - $ref: "#/components/parameters/IntID"
      responses:
        "204":
          description: Run queued
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Duplicate active report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Worker queue full
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Analysis scheduler not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Health ──────────────────────────────────────────────────────────────
  /health:
    servers:
      - url: /
        description: Health endpoint is at root, not under /api/v1
    get:
      operationId: health
      x-required-scope: none
      tags: [Health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
        "503":
          description: Unhealthy (database unreachable)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: unhealthy

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    session:
      type: apiKey
      in: cookie
      name: tl_session
      description: Session cookie set by POST /auth/login
    apiKey:
      type: http
      scheme: bearer
      description: "API key obtained from POST /auth/keys"

  # ── Parameters ──────────────────────────────────────────────────────────
  parameters:
    UUID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    IntID:
      name: id
      in: path
      required: true
      schema:
        type: integer

    Cursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Keyset pagination cursor

    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100

    Search:
      name: search
      in: query
      schema:
        type: string
        maxLength: 500
      description: Case-insensitive substring search on message text

    From:
      name: from
      in: query
      schema:
        type: string
        format: date-time
      description: Start time (inclusive)

    To:
      name: to
      in: query
      schema:
        type: string
        format: date-time
      description: End time (inclusive)

    Interval:
      name: interval
      in: query
      schema:
        type: string
        enum: [1m, 5m, 15m, 30m, 1h, 6h, 1d]
        default: "1h"

    Range:
      name: range
      in: query
      schema:
        type: string
        enum: [1h, 6h, 12h, 24h, 7d, 30d]
        default: "24h"

    # Srvlog-specific
    SrvlogHostname:
      name: hostname
      in: query
      schema:
        type: string
        maxLength: 500

    SrvlogProgramname:
      name: programname
      in: query
      schema:
        type: string
        maxLength: 500

    SyslogTag:
      name: syslogtag
      in: query
      schema:
        type: string
        maxLength: 500

    SrvlogMsgID:
      name: msgid
      in: query
      schema:
        type: string
        maxLength: 500

    FromHostIP:
      name: fromhost_ip
      in: query
      schema:
        type: string
      description: Source IP address (IPv4 or IPv6)

    Severity:
      name: severity
      in: query
      schema:
        type: integer
        minimum: 0
        maximum: 7
      description: Exact severity level (0=emerg .. 7=debug)

    SeverityMax:
      name: severity_max
      in: query
      schema:
        type: integer
        minimum: 0
        maximum: 7
      description: Maximum severity level (returns this level and lower numeric values)

    Facility:
      name: facility
      in: query
      schema:
        type: integer
        minimum: 0
        maximum: 23

    # AppLog-specific
    AppLogService:
      name: service
      in: query
      schema:
        type: string
        maxLength: 500

    AppLogComponent:
      name: component
      in: query
      schema:
        type: string
        maxLength: 500

    AppLogHost:
      name: host
      in: query
      schema:
        type: string
        maxLength: 500

    AppLogLevel:
      name: level
      in: query
      schema:
        type: string
        enum: [DEBUG, INFO, WARN, ERROR, FATAL]
      description: Minimum log level (returns this level and above)

    AppLogLevelExact:
      name: level_exact
      in: query
      schema:
        type: string
        enum: [DEBUG, INFO, WARN, ERROR, FATAL]
      description: Exact log level match (unlike `level`, which is a minimum)

  # ── Responses ───────────────────────────────────────────────────────────
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    StringList:
      description: List of strings
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: array
                items:
                  type: string

  # ── Schemas ─────────────────────────────────────────────────────────────
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

    StatusOK:
      type: object
      properties:
        status:
          type: string
          example: ok

    # ── Auth ──────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    UserInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          nullable: true
        is_admin:
          type: boolean
        is_active:
          type: boolean
        auth_source:
          type: string
          description: '"local" for bcrypt-authenticated users, "ldap" for LDAP-authenticated users'
          enum: [local, ldap]
        gravatar_url:
          type: string
        preferences:
          type: object
          description: Arbitrary user preferences JSON
        created_at:
          type: string
          format: date-time
        last_login_at:
          type: string
          format: date-time
          nullable: true

    UserResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserInfo"

    AdminUser:
      description: Same shape as UserInfo (ListUsers uses the same serializer)
      $ref: "#/components/schemas/UserInfo"

    CreateKeyRequest:
      type: object
      required: [name, scopes]
      properties:
        name:
          type: string
          maxLength: 255
        scopes:
          type: array
          items:
            type: string
            enum: [read, ingest, admin]
          description: At least one scope required
        expires_at:
          type: string
          format: date-time
          nullable: true

    APIKeyInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        name:
          type: string
        key_prefix:
          type: string
        scopes:
          type: array
          items:
            type: string
            enum: [read, ingest, admin]
        expires_at:
          type: string
          format: date-time
          nullable: true
        revoked_at:
          type: string
          format: date-time
          nullable: true
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    # ── Srvlog ────────────────────────────────────────────────────────────
    SrvlogEvent:
      type: object
      properties:
        id:
          type: integer
        received_at:
          type: string
          format: date-time
        reported_at:
          type: string
          format: date-time
        hostname:
          type: string
        fromhost_ip:
          type: string
        programname:
          type: string
        msgid:
          type: string
        severity:
          type: integer
          minimum: 0
          maximum: 7
        severity_label:
          type: string
          enum: [emerg, alert, crit, err, warning, notice, info, debug]
        facility:
          type: integer
          minimum: 0
          maximum: 23
        facility_label:
          type: string
        syslogtag:
          type: string
        structured_data:
          type: string
          description: Omitted entirely (not null) when the event has none
        message:
          type: string
        raw_message:
          type: string
          description: Omitted entirely (not null) when the event has none

    # ── Netlog ────────────────────────────────────────────────────────────
    NetlogEvent:
      type: object
      properties:
        id:
          type: integer
        received_at:
          type: string
          format: date-time
        reported_at:
          type: string
          format: date-time
        hostname:
          type: string
        fromhost_ip:
          type: string
        programname:
          type: string
        msgid:
          type: string
        severity:
          type: integer
          minimum: 0
          maximum: 7
        severity_label:
          type: string
          enum: [emerg, alert, crit, err, warning, notice, info, debug]
        facility:
          type: integer
          minimum: 0
          maximum: 23
        facility_label:
          type: string
        syslogtag:
          type: string
        structured_data:
          type: string
          description: Omitted entirely (not null) when the event has none
        message:
          type: string
        raw_message:
          type: string
          description: Omitted entirely (not null) when the event has none

    # ── AppLog ────────────────────────────────────────────────────────────
    AppLogEvent:
      type: object
      properties:
        id:
          type: integer
        received_at:
          type: string
          format: date-time
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          enum: [DEBUG, INFO, WARN, ERROR, FATAL]
        service:
          type: string
        component:
          type: string
          description: Empty string (not null) when not provided
        host:
          type: string
        msg:
          type: string
        source:
          type: string
          description: Empty string (not null) when not provided
        attrs:
          type: object
          nullable: true
          additionalProperties: true
        attrs_truncated:
          type: boolean
          description: |
            Present (true) only on list/SSE responses when attrs was elided to
            control payload size; fetch the event by ID for the full attrs.
            Detail responses never set this.
        source_ip:
          type: string
          description: |
            Client IP resolved by the ingest handler. Omitted when unknown
            (rows ingested before the field was added).
        api_key_id:
          type: string
          format: uuid
          nullable: true
          description: |
            API key that ingested this row; null when inserted via session
            auth or before the field was added.

    IngestRequest:
      type: object
      required: [logs]
      properties:
        logs:
          type: array
          maxItems: 1000
          items:
            $ref: "#/components/schemas/IngestEntry"

    IngestEntry:
      type: object
      required: [timestamp, level, msg, service, host]
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          description: "DEBUG, INFO, WARN, ERROR, or FATAL (also accepts TRACE, WARNING, CRITICAL, PANIC)"
        msg:
          type: string
          maxLength: 65536
        service:
          type: string
          maxLength: 128
        component:
          type: string
          maxLength: 128
        host:
          type: string
          maxLength: 256
        source:
          type: string
          maxLength: 256
        attrs:
          type: object
          additionalProperties: true

    # ── Stats ─────────────────────────────────────────────────────────────
    VolumeBucket:
      type: object
      properties:
        time:
          type: string
          format: date-time
        total:
          type: integer
        by_host:
          type: object
          additionalProperties:
            type: integer

    SeverityVolumeBucket:
      type: object
      properties:
        time:
          type: string
          format: date-time
        total:
          type: integer
        by_severity:
          type: object
          additionalProperties:
            type: integer

    SrvlogSummary:
      type: object
      properties:
        total:
          type: integer
        trend:
          type: number
          format: double
          description: Percentage change vs previous period
        errors:
          type: integer
        warnings:
          type: integer
        severity_breakdown:
          type: array
          items:
            type: object
            properties:
              severity:
                type: integer
              label:
                type: string
              count:
                type: integer
              pct:
                type: number
                format: double
        top_hosts:
          type: array
          items:
            $ref: "#/components/schemas/NamedCount"

    AppLogSummary:
      type: object
      properties:
        total:
          type: integer
        trend:
          type: number
          format: double
        errors:
          type: integer
        warnings:
          type: integer
        level_breakdown:
          type: array
          items:
            type: object
            properties:
              level:
                type: string
              count:
                type: integer
              pct:
                type: number
                format: double
        top_services:
          type: array
          items:
            $ref: "#/components/schemas/NamedCount"

    NamedCount:
      type: object
      properties:
        name:
          type: string
        count:
          type: integer
        pct:
          type: number
          format: double

    # ── Juniper ───────────────────────────────────────────────────────────
    JuniperRef:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        message:
          type: string
        description:
          type: string
        type:
          type: string
        severity:
          type: string
        cause:
          type: string
        action:
          type: string
        os:
          type: string
        created_at:
          type: string
          format: date-time

    # ── Rsyslog ───────────────────────────────────────────────────────────
    RsyslogSummary:
      type: object
      properties:
        total_submitted:
          type: integer
        total_processed:
          type: integer
        total_failed:
          type: integer
        total_suspended:
          type: integer
        main_queue_size:
          type: integer
        main_queue_max_size:
          type: integer
        total_discarded:
          type: integer
        filter_rate:
          type: number
          format: double
        failure_rate:
          type: number
          format: double
        ingest_rate:
          type: number
          format: double
        components:
          type: array
          items:
            type: object
            properties:
              collected_at:
                type: string
                format: date-time
              origin:
                type: string
              name:
                type: string
              stats:
                type: object
                additionalProperties: true

    NamedTimeSeries:
      type: object
      properties:
        time:
          type: string
          format: date-time
        name:
          type: string
        value:
          type: number
          format: double

    # ── Taillight Metrics ─────────────────────────────────────────────────
    TaillightMetrics:
      type: object
      properties:
        sse_clients_srvlog:
          type: integer
        sse_clients_applog:
          type: integer
        db_pool_active:
          type: integer
        db_pool_idle:
          type: integer
        db_pool_total:
          type: integer
        events_broadcast:
          type: integer
        events_dropped:
          type: integer
        applog_events_broadcast:
          type: integer
        applog_events_dropped:
          type: integer
        applog_ingest_total:
          type: integer
        applog_ingest_errors:
          type: integer
        listener_reconnects:
          type: integer
        events_rate:
          type: number
          format: double
        ingest_rate:
          type: number
          format: double

    TimeSeries:
      type: object
      properties:
        time:
          type: string
          format: date-time
        value:
          type: number
          format: double

    # ── Notifications ────────────────────────────────────────────────────
    NotificationChannel:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [slack, webhook, email]
        config:
          type: object
          additionalProperties: true
          description: Backend-specific configuration (webhook URL, Slack token, SMTP settings, etc.)
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    NotificationChannelInput:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [slack, webhook, email]
        config:
          type: object
          additionalProperties: true
        enabled:
          type: boolean

    NotificationRule:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        enabled:
          type: boolean
        event_kind:
          type: string
          enum: [srvlog, netlog, applog]
        hostname:
          type: string
        programname:
          type: string
        severity:
          type: integer
          nullable: true
        severity_max:
          type: integer
          nullable: true
        facility:
          type: integer
          nullable: true
        syslogtag:
          type: string
        msgid:
          type: string
        service:
          type: string
        component:
          type: string
        host:
          type: string
        level:
          type: string
        search:
          type: string
        channel_ids:
          type: array
          items:
            type: integer
        group_by:
          type: string
          description: Field to group events by (e.g. hostname, service)
        silence_ms:
          type: integer
          description: Silence window in ms after the initial alert fires. Matching events during this window are counted and emitted as a single digest when the window closes.
        silence_max_ms:
          type: integer
          description: Upper bound (ms) on the silence window. While a rule keeps firing digests, each new silence is previous + silence_ms, capped here.
        coalesce_ms:
          type: integer
          description: Optional sub-second batching window for the first alert. 0 = fire first match immediately.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

