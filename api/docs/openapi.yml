openapi: "3.1.0"
info:
  title: Taillight API
  description: |
    Taillight is a centralized srvlog and application-log viewer with real-time
    streaming, analysis reports, and rsyslog/Juniper integration.

    ## Auth scopes

    Every operation carries an `x-required-scope` marker matching the server's
    route groups:

    - `none` — public, no authentication.
    - `authenticated` — any valid session or API key (no specific scope).
    - `read` — all GET/stream/export endpoints. Only enforced when
      `auth_read_endpoints` is enabled; sessions always hold this scope,
      API keys need the `read` scope.
    - `ingest` — the applog ingest endpoint (API key with `ingest` scope,
      or any session).
    - `admin` — write operations. Sessions require the user's admin flag;
      API keys need the `admin` scope.
  version: "1.0.0"
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: /api/v1
    description: Default API prefix

tags:
  - name: Config
    description: Runtime feature flags for the frontend
  - name: Auth
    description: Authentication, user management, and API keys
  - name: Srvlog
    description: Srvlog event queries and streaming
  - name: Srvlog Metadata
    description: Distinct values for srvlog filter dropdowns
  - name: AppLog
    description: Application log queries, streaming, and ingestion
  - name: AppLog Metadata
    description: Distinct values for applog filter dropdowns
  - name: Netlog
    description: Netlog (network device) event queries and streaming
  - name: Netlog Metadata
    description: Distinct values for netlog filter dropdowns
  - name: Stats
    description: Srvlog, Netlog, and AppLog volume and summary statistics
  - name: Juniper
    description: Juniper syslog reference lookups
  - name: Rsyslog
    description: Rsyslog daemon statistics
  - name: Metrics
    description: Taillight internal metrics
  - name: Notifications
    description: Alert channels, rules, summary schedules, and delivery log
  - name: Netbox
    description: Netbox enrichment lookups (routes registered only when Netbox is configured)
  - name: Device
    description: Per-host device detail views
  - name: Analysis
    description: LLM-generated analysis reports
  - name: Health
    description: Health check

# ---------------------------------------------------------------------------
# Security
# ---------------------------------------------------------------------------
security:
  - session: []
  - apiKey: []

# ---------------------------------------------------------------------------
# Paths
# ---------------------------------------------------------------------------
paths:
  # ── Config ──────────────────────────────────────────────────────────────
  /config/features:
    get:
      operationId: configFeatures
      x-required-scope: none
      tags: [Config]
      summary: Runtime feature flags
      description: |
        Feature flags the frontend uses for routing and nav. Unauthenticated —
        the frontend must fetch it before any auth UI can render. The three
        feed flags are always true; `analysis` reflects `analysis.enabled`.
      security: []
      responses:
        "200":
          description: Feature flags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeaturesResponse"

  # ── Auth ────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      x-required-scope: none
      tags: [Auth]
      summary: Log in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Successful login (sets `tl_session` cookie)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      operationId: logout
      x-required-scope: none
      tags: [Auth]
      summary: Log out
      security: []
      responses:
        "200":
          description: Session cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"

  /auth/me:
    get:
      operationId: me
      x-required-scope: authenticated
      tags: [Auth]
      summary: Current user info
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me/email:
    patch:
      operationId: updateEmail
      x-required-scope: authenticated
      tags: [Auth]
      summary: Update own email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me/preferences:
    patch:
      operationId: updatePreferences
      x-required-scope: authenticated
      tags: [Auth]
      summary: Update user preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [preferences]
              properties:
                preferences:
                  type: object
                  description: Arbitrary JSON preferences object
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/keys:
    get:
      operationId: listKeys
      x-required-scope: authenticated
      tags: [Auth]
      summary: List API keys
      responses:
        "200":
          description: API key list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/APIKeyInfo"
    post:
      operationId: createKey
      x-required-scope: authenticated
      tags: [Auth]
      summary: Create API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKeyRequest"
      responses:
        "201":
          description: Key created (full key shown once)
          content:
            application/json:
              schema:
                type: object
                properties:
                  key:
                    type: string
                    description: Full API key — only shown at creation time
                  key_info:
                    $ref: "#/components/schemas/APIKeyInfo"
        "400":
          $ref: "#/components/responses/BadRequest"

  /auth/keys/{id}:
    delete:
      operationId: revokeKey
      x-required-scope: authenticated
      tags: [Auth]
      summary: Revoke an API key
      parameters:
        - $ref: "#/components/parameters/UUID"
      responses:
        "200":
          description: Key revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/users:
    get:
      operationId: listUsers
      x-required-scope: admin
      tags: [Auth]
      summary: List users (admin)
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AdminUser"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createUser
      x-required-scope: admin
      tags: [Auth]
      summary: Create user (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  minLength: 1
                  maxLength: 255
                password:
                  type: string
                  minLength: 8
                  maxLength: 72
                  description: Bcrypt limit caps passwords at 72 bytes
                is_admin:
                  type: boolean
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/users/{id}/active:
    patch:
      operationId: setUserActive
      x-required-scope: admin
      tags: [Auth]
      summary: Activate / deactivate user (admin)
      parameters:
        - $ref: "#/components/parameters/UUID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [active]
              properties:
                active:
                  type: boolean
      responses:
        "200":
          description: Status changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/users/{id}/password:
    patch:
      operationId: updateUserPassword
      x-required-scope: admin
      tags: [Auth]
      summary: Update user password (admin)
      description: |
        The route group requires admin scope. Changing your own password
        requires `current_password` in the request body; resetting another
        user's password does not. Returns 403 for LDAP-managed users
        (password changes must go through the LDAP directory).
      parameters:
        - $ref: "#/components/parameters/UUID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  minLength: 8
                  maxLength: 72
                  description: Bcrypt limit caps passwords at 72 bytes
                current_password:
                  type: string
                  description: Required when changing your own password
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/sessions/revoke-all:
    post:
      operationId: logoutAll
      x-required-scope: authenticated
      tags: [Auth]
      summary: Revoke all sessions for current user
      description: Logs out all sessions including the current one and clears the session cookie.
      responses:
        "200":
          description: All sessions revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/users/{id}/revoke-sessions:
    post:
      operationId: revokeUserSessions
      x-required-scope: admin
      tags: [Auth]
      summary: Revoke all sessions for a user (admin)
      parameters:
        - $ref: "#/components/parameters/UUID"
      responses:
        "200":
          description: User sessions revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ── Srvlog ──────────────────────────────────────────────────────────────
  /srvlog:
    get:
      operationId: listSrvlog
      x-required-scope: read
      tags: [Srvlog]
      summary: List srvlog events
      parameters:
        - $ref: "#/components/parameters/SrvlogHostname"
        - $ref: "#/components/parameters/SrvlogProgramname"
        - $ref: "#/components/parameters/SyslogTag"
        - $ref: "#/components/parameters/SrvlogMsgID"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/FromHostIP"
        - $ref: "#/components/parameters/Severity"
        - $ref: "#/components/parameters/SeverityMax"
        - $ref: "#/components/parameters/Facility"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated srvlog events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SrvlogEvent"
                  cursor:
                    type: string
                    description: Opaque keyset cursor for the next page; omitted on the last page
                  has_more:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"

  /srvlog/{id}:
    get:
      operationId: getSrvlog
      x-required-scope: read
      tags: [Srvlog]
      summary: Get single srvlog event
      parameters:
        - $ref: "#/components/parameters/IntID"
      responses:
        "200":
          description: Srvlog event
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SrvlogEvent"
        "404":
          $ref: "#/components/responses/NotFound"

  /srvlog/stream:
    get:
      operationId: streamSrvlog
      x-required-scope: read
      tags: [Srvlog]
      summary: Stream srvlog events (SSE)
      description: |
        Server-Sent Events stream. Backfills up to 100 recent events on
        connect, then pushes new events in real time.

        - Event name: `srvlog`
        - Heartbeat every 15 s: `event: heartbeat`
      parameters:
        - $ref: "#/components/parameters/SrvlogHostname"
        - $ref: "#/components/parameters/SrvlogProgramname"
        - $ref: "#/components/parameters/SyslogTag"
        - $ref: "#/components/parameters/SrvlogMsgID"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/FromHostIP"
        - $ref: "#/components/parameters/Severity"
        - $ref: "#/components/parameters/SeverityMax"
        - $ref: "#/components/parameters/Facility"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - name: lastEventId
          in: query
          schema:
            type: string
          description: Resume from this event ID (alternative to `Last-Event-ID` header)
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}

  /srvlog/export:
    get:
      operationId: exportSrvlog
      x-required-scope: read
      tags: [Srvlog]
      summary: Export srvlog events as CSV
      description: |
        Streams up to 100 000 matching events as CSV. `from` and `to` are
        required and must span at most 30 days.
      parameters:
        - $ref: "#/components/parameters/SrvlogHostname"
        - $ref: "#/components/parameters/SrvlogProgramname"
        - $ref: "#/components/parameters/SyslogTag"
        - $ref: "#/components/parameters/SrvlogMsgID"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/FromHostIP"
        - $ref: "#/components/parameters/Severity"
        - $ref: "#/components/parameters/SeverityMax"
        - $ref: "#/components/parameters/Facility"
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: CSV download (Content-Disposition attachment)
          content:
            text/csv:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Srvlog Metadata ─────────────────────────────────────────────────────
  /srvlog/meta/hosts:
    get:
      operationId: srvlogHosts
      x-required-scope: read
      tags: [Srvlog Metadata]
      summary: Distinct hostnames
      responses:
        "200":
          $ref: "#/components/responses/StringList"

  /srvlog/meta/programs:
    get:
      operationId: srvlogPrograms
      x-required-scope: read
      tags: [Srvlog Metadata]
      summary: Distinct program names
      responses:
        "200":
          $ref: "#/components/responses/StringList"

  /srvlog/meta/facilities:
    get:
      operationId: srvlogFacilities
      x-required-scope: read
      tags: [Srvlog Metadata]
      summary: Facility codes in use
      responses:
        "200":
          description: List of integer facility codes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: integer

  /srvlog/meta/tags:
    get:
      operationId: srvlogTags
      x-required-scope: read
      tags: [Srvlog Metadata]
      summary: Distinct srvlog tags
      responses:
        "200":
          $ref: "#/components/responses/StringList"

  # ── Srvlog Stats ──────────────────────────────────────────────────────
  /srvlog/stats/volume:
    get:
      operationId: srvlogVolume
      x-required-scope: read
      tags: [Stats]
      summary: Srvlog volume over time
      parameters:
        - $ref: "#/components/parameters/Interval"
        - $ref: "#/components/parameters/Range"
      responses:
        "200":
          description: Volume buckets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/VolumeBucket"

  /srvlog/stats/severity-volume:
    get:
      operationId: srvlogSeverityVolume
      x-required-scope: read
      tags: [Stats]
      summary: Srvlog severity volume over time
      parameters:
        - $ref: "#/components/parameters/Interval"
        - $ref: "#/components/parameters/Range"
      responses:
        "200":
          description: Severity volume buckets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SeverityVolumeBucket"

  /srvlog/stats/summary:
    get:
      operationId: srvlogSummary
      x-required-scope: read
      tags: [Stats]
      summary: Srvlog summary
      parameters:
        - $ref: "#/components/parameters/Range"
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/SrvlogSummary"

  /srvlog/stats/hosts:
    get:
      operationId: srvlogStatsHosts
      x-required-scope: read
      tags: [Stats]
      summary: Hosts overview
      description: |
        Per-host activity across the srvlog and netlog feeds — status, counts,
        trend, severity breakdown, hourly buckets, and top error sources.
      parameters:
        - $ref: "#/components/parameters/Range"
      responses:
        "200":
          description: Host entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/HostEntry"

  /srvlog/device/{hostname}:
    get:
      operationId: getSrvlogDeviceSummary
      x-required-scope: read
      tags: [Device]
      summary: Srvlog device detail
      description: Aggregated summary for a single srvlog device by hostname.
      parameters:
        - name: hostname
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/DeviceSummary"
        "400":
          $ref: "#/components/responses/BadRequest"

  # ── Netlog ─────────────────────────────────────────────────────────────
  /netlog:
    get:
      operationId: listNetlog
      x-required-scope: read
      tags: [Netlog]
      summary: List netlog events
      parameters:
        - $ref: "#/components/parameters/SrvlogHostname"
        - $ref: "#/components/parameters/SrvlogProgramname"
        - $ref: "#/components/parameters/SyslogTag"
        - $ref: "#/components/parameters/SrvlogMsgID"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/FromHostIP"
        - $ref: "#/components/parameters/Severity"
        - $ref: "#/components/parameters/SeverityMax"
        - $ref: "#/components/parameters/Facility"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated netlog events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/NetlogEvent"
                  cursor:
                    type: string
                    description: Opaque keyset cursor for the next page; omitted on the last page
                  has_more:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"

  /netlog/{id}:
    get:
      operationId: getNetlog
      x-required-scope: read
      tags: [Netlog]
      summary: Get single netlog event
      parameters:
        - $ref: "#/components/parameters/IntID"
      responses:
        "200":
          description: Netlog event with optional Juniper reference
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: "#/components/schemas/NetlogEvent"
                      - type: object
                        properties:
                          juniper_ref:
                            type: array
                            items:
                              $ref: "#/components/schemas/JuniperRef"
        "404":
          $ref: "#/components/responses/NotFound"

  /netlog/{id}/netbox:
    get:
      operationId: enrichNetlog
      x-required-scope: read
      tags: [Netbox]
      summary: Netbox enrichment for a netlog event
      description: |
        Extracts entities (devices, IPs, prefixes, ASNs, interfaces) from the
        event's message and hostname and looks each up in Netbox. Per-entity
        failures are reported via `lookups[].error`; they don't fail the
        request. Registered only when the Netbox integration is configured.
      parameters:
        - $ref: "#/components/parameters/IntID"
      responses:
        "200":
          description: Enrichment result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      entities:
                        type: array
                        items:
                          $ref: "#/components/schemas/NetboxEntity"
                      lookups:
                        type: array
                        items:
                          $ref: "#/components/schemas/NetboxLookup"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /netlog/stream:
    get:
      operationId: streamNetlog
      x-required-scope: read
      tags: [Netlog]
      summary: Stream netlog events (SSE)
      description: |
        Server-Sent Events stream. Backfills up to 100 recent events on
        connect, then pushes new events in real time.

        - Event name: `netlog`
        - Heartbeat every 15 s: `event: heartbeat`
      parameters:
        - $ref: "#/components/parameters/SrvlogHostname"
        - $ref: "#/components/parameters/SrvlogProgramname"
        - $ref: "#/components/parameters/SyslogTag"
        - $ref: "#/components/parameters/SrvlogMsgID"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/FromHostIP"
        - $ref: "#/components/parameters/Severity"
        - $ref: "#/components/parameters/SeverityMax"
        - $ref: "#/components/parameters/Facility"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - name: lastEventId
          in: query
          schema:
            type: string
          description: Resume from this event ID (alternative to `Last-Event-ID` header)
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}

  /netlog/export:
    get:
      operationId: exportNetlog
      x-required-scope: read
      tags: [Netlog]
      summary: Export netlog events as CSV
      description: |
        Streams up to 100 000 matching events as CSV. `from` and `to` are
        required and must span at most 30 days.
      parameters:
        - $ref: "#/components/parameters/SrvlogHostname"
        - $ref: "#/components/parameters/SrvlogProgramname"
        - $ref: "#/components/parameters/SyslogTag"
        - $ref: "#/components/parameters/SrvlogMsgID"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/FromHostIP"
        - $ref: "#/components/parameters/Severity"
        - $ref: "#/components/parameters/SeverityMax"
        - $ref: "#/components/parameters/Facility"
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: CSV download (Content-Disposition attachment)
          content:
            text/csv:
              schema:
                type: string
