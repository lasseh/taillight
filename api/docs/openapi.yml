    # ── Analysis ──────────────────────────────────────────────────────────
    ReportSummary:
      type: object
      properties:
        id:
          type: integer
        slug:
          type: string
          description: "<feed>-YYYY-MM-DD-HHMM, used as the URL segment"
        feed:
          type: string
          enum: [netlog, srvlog, all]
          description: "'all' = all syslog feeds (srvlog + netlog); applog is excluded by design"
        prompt_mode:
          type: string
          enum: [daily, weekly, incident]
          description: Prompt set that framed the report
        hosts:
          type: array
