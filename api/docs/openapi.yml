      responses:
        "200":
          description: Paginated applog events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AppLogEvent"
                  cursor:
                    type: string
                    description: Opaque keyset cursor for the next page; omitted on the last page
                  has_more:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"

