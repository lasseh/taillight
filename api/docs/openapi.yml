        created_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true

    Report:
      allOf:
        - $ref: "#/components/schemas/ReportSummary"
        - type: object
          properties:
            report:
              type: string
              description: Markdown-formatted analysis report; absent until status=completed
            error:
              type: string
              description: Short failure message; present only when status=failed

    AnalysisSchedule:
      type: object
