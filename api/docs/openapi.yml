        "404":
          $ref: "#/components/responses/NotFound"

  /applog/stream:
    get:
      operationId: streamAppLog
      x-required-scope: read
      tags: [AppLog]
      summary: Stream application log events (SSE)
      description: |
        Server-Sent Events stream. Backfills up to 100 recent events on
        connect, then pushes new events in real time.

        - Event name: `applog`
        - Heartbeat every 15 s: `event: heartbeat`
      parameters:
        - $ref: "#/components/parameters/AppLogService"
        - $ref: "#/components/parameters/AppLogComponent"
        - $ref: "#/components/parameters/AppLogHost"
        - $ref: "#/components/parameters/AppLogLevel"
        - $ref: "#/components/parameters/AppLogLevelExact"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - name: lastEventId
          in: query
          schema:
            type: string
          description: Resume from this event ID (alternative to `Last-Event-ID` header)
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}

  /applog/export:
    get:
      operationId: exportAppLog
      x-required-scope: read
      tags: [AppLog]
      summary: Export application log events as CSV
      description: |
        Streams up to 100 000 matching events as CSV. `from` and `to` are
        required and must span at most 30 days.
      parameters:
        - $ref: "#/components/parameters/AppLogService"
        - $ref: "#/components/parameters/AppLogComponent"
        - $ref: "#/components/parameters/AppLogHost"
        - $ref: "#/components/parameters/AppLogLevel"
        - $ref: "#/components/parameters/AppLogLevelExact"
        - $ref: "#/components/parameters/Search"
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: CSV download (Content-Disposition attachment)
          content:
            text/csv:
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"

  /applog/ingest:
    post:
      operationId: ingestAppLog
      x-required-scope: ingest
      tags: [AppLog]
      summary: Ingest application log batch
      description: |
        Accepts up to 1 000 log entries per request (max 5 MB body).
        Entries are inserted atomically and broadcast to SSE clients.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequest"
      responses:
        "202":
          description: Batch accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  accepted:
                    type: integer
                    description: Number of entries inserted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: Request body exceeds 5 MB
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

