      responses:
        "200":
          description: Rule list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/NotificationRule"
    post:
      operationId: createRule
      tags: [Notifications]
      summary: Create notification rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationRuleInput"
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/NotificationRule"
        "400":
          $ref: "#/components/responses/BadRequest"

  /notifications/rules/{id}:
    get:
      operationId: getRule
      tags: [Notifications]
      summary: Get notification rule
      parameters:
        - $ref: "#/components/parameters/IntID"
      responses:
        "200":
          description: Rule detail
