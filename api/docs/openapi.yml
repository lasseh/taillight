          nullable: true
        syslogtag:
          type: string
        msgid:
          type: string
        service:
          type: string
        component:
          type: string
        host:
          type: string
        level:
          type: string
        search:
          type: string
        channel_ids:
          type: array
          items:
            type: integer
        group_by:
          type: string
        silence_ms:
          type: integer
        silence_max_ms:
          type: integer
        coalesce_ms:
          type: integer

