          type: array
          items:
            type: integer
            format: int64
        last_run_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SummaryScheduleInput:
      type: object
      required: [name, frequency, event_kinds, channel_ids]
      properties:
        name:
          type: string
        enabled:
          type: boolean
        frequency:
          type: string
          enum: [daily, weekly, monthly]
        day_of_week:
          type: integer
          minimum: 0
          maximum: 6
        day_of_month:
          type: integer
          minimum: 1
          maximum: 28
        time_of_day:
          type: string
          example: "08:00"
        timezone:
          type: string
          description: IANA timezone; defaults to UTC
        event_kinds:
          type: array
          minItems: 1
          items:
            type: string
            enum: [srvlog, netlog, applog]
        severity_max:
          type: integer
          minimum: 0
          maximum: 7
        hostname:
          type: string
        top_n:
          type: integer
          description: Defaults to 25 when omitted or zero
        channel_ids:
          type: array
          minItems: 1
          items:
            type: integer
            format: int64

    NetboxEntity:
      type: object
      properties:
        type:
          type: string
          enum: [device, ip, prefix, asn, interface]
        value:
