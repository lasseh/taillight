    NotificationChannel:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [slack, webhook, email]
        config:
          type: object
          additionalProperties: true
          description: Backend-specific configuration (webhook URL, Slack token, SMTP settings, etc.)
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    NotificationChannelInput:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          enum: [slack, webhook, email]
        config:
          type: object
          additionalProperties: true
        enabled:
          type: boolean

    NotificationRule:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        enabled:
          type: boolean
        event_kind:
          type: string
          enum: [srvlog, netlog, applog]
        hostname:
          type: string
        programname:
          type: string
        severity:
          type: integer
          nullable: true
        severity_max:
          type: integer
          nullable: true
        facility:
          type: integer
          nullable: true
        syslogtag:
          type: string
        msgid:
          type: string
        service:
          type: string
        component:
          type: string
        host:
          type: string
        level:
          type: string
        search:
          type: string
        channel_ids:
          type: array
          items:
            type: integer
        group_by:
          type: string
          description: Field to group events by (e.g. hostname, service)
        silence_ms:
          type: integer
          description: Silence window in ms after the initial alert fires. Matching events during this window are counted and emitted as a single digest when the window closes.
        silence_max_ms:
          type: integer
          description: Upper bound (ms) on the silence window. While a rule keeps firing digests, each new silence is previous + silence_ms, capped here.
        coalesce_ms:
          type: integer
          description: Optional sub-second batching window for the first alert. 0 = fire first match immediately.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    NotificationRuleInput:
      type: object
      required: [name, event_kind]
      properties:
        name:
          type: string
        enabled:
          type: boolean
        event_kind:
          type: string
          enum: [srvlog, netlog, applog]
        hostname:
          type: string
        programname:
          type: string
        severity:
          type: integer
          nullable: true
