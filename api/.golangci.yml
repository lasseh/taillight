version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gocritic
    - revive
    - errname
    - errorlint
    - exhaustive
    - gocyclo
    - godot
    - gosec
    - misspell
    - noctx
    - prealloc
    - unconvert
    - unparam
    - wastedassign
  settings:
    revive:
      rules:
        - name: unexported-return
          disabled: true
        - name: var-naming
          disabled: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - whyNoLint
        - httpNoBody
        - nestingReduce
        - unnamedResult
        - appendCombine
    exhaustive:
      default-signifies-exhaustive: true
    gocyclo:
      # Ratchet at 30: only flags genuinely sprawling functions (15 would
      # flag ~32 functions — too noisy). See backend audit issue 12.
      min-complexity: 30
    gosec:
      # Scoped to the SQL-injection detectors (defense-in-depth); the full
      # ruleset is too noisy to be a blocking gate. Note: gosec only
      # recognizes database/sql sinks, so pgx query sites are not inspected.
      includes:
        - G201
        - G202

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
