name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26"
          cache-dependency-path: api/go.sum

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: latest
          working-directory: api

      - name: Run tests
        run: make test

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run vulnerability check
        run: make vulncheck

  integration:
    name: DB Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg18
        env:
          POSTGRES_USER: taillight
          POSTGRES_PASSWORD: taillight
          POSTGRES_DB: taillight_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taillight -d taillight_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26"
          cache-dependency-path: api/go.sum

      # Runs the gated DB integration tests (keyset pagination, batch-insert
      # ordering, api-key join) against the service container. TEST_DATABASE_URL
      # makes the Makefile target use it directly instead of spinning up its own
      # ephemeral container.
      - name: Run DB integration tests
        env:
          TEST_DATABASE_URL: postgres://taillight:taillight@localhost:5432/taillight_test?sslmode=disable
        run: make test-integration

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint (errors only)
        run: npx eslint . --quiet

      - name: Format check
        run: npm run format:check

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
