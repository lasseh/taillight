version: 2
updates:
  # Go backend (api/go.mod)
  - package-ecosystem: "gomod"
    directory: "/api"
    schedule:
      interval: "weekly"

  # Go logshipper module (pkg/logshipper/go.mod)
  - package-ecosystem: "gomod"
    directory: "/pkg/logshipper"
    schedule:
      interval: "weekly"

  # TypeScript frontend (frontend/package.json)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      # @unovis/vue pins an exact peer dep on @unovis/ts — must bump together
      unovis:
        patterns:
          - "@unovis/*"

  # Python SDK (sdk/python/pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/sdk/python"
    schedule:
      interval: "weekly"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
