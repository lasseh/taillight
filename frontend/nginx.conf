server {
    listen 8080;
    listen [::]:8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers. NOTE: nginx add_header does NOT inherit into a location
    # that declares its own add_header, so this full set is repeated in every
    # header-bearing location below (= /index.html and the static-asset regex).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=(), interest-cohort=()" always;

    # Content-Security-Policy — REPORT-ONLY while violations are triaged;
    # promote to enforcing (Content-Security-Policy) once browser consoles
    # are clean. Policy is defined once in this variable and emitted via
    # add_header in each header-bearing location below.
    #   - script-src 'self' will report the two known inline scripts (the
    #     theme-init script in index.html and the window.__CONFIG__ script
    #     injected by docker-entrypoint.sh) until they are externalized.
    #   - style-src 'unsafe-inline' is required: Vue and Unovis set inline
    #     style attributes and inject <style> elements at runtime.
    #   - connect-src 'self' covers same-origin fetch/SSE; when API_URL
    #     points at a different origin, append that origin here.
    #   - frame-src 'self' allows the same-origin print iframe (PDF export).
    #   - No external CDNs: fonts (jetbrains-mono) and all assets are
    #     self-hosted and bundled by Vite.
    set $csp_report_only "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'self'";
    add_header Content-Security-Policy-Report-Only $csp_report_only always;

    # Gzip compression
    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        text/css
        text/javascript
        text/plain
        image/svg+xml;

    # API proxy — routes /api requests to the Go backend.
    # Uses Docker's internal DNS resolver so nginx starts even if "api"
    # is not resolvable (e.g. running the container standalone).
    # In production behind a reverse proxy, /api never reaches this container.
    resolver 127.0.0.11 valid=30s;
    set $api_backend http://api:8080;

    location /api/ {
        proxy_pass $api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE streams — long-lived, no buffering
    location ~ ^/api/v1/(srvlog|netlog|applog)/stream$ {
        proxy_pass $api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SPA routing - serve index.html for all non-file requests
    location / {
        try_files $uri $uri/ /index.html;
    }

    # SPA shell — always revalidate
    location = /index.html {
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=(), interest-cohort=()" always;
        add_header Content-Security-Policy-Report-Only $csp_report_only always;
        add_header Cache-Control "no-cache";
    }

    # Hashed static assets — immutable long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=(), interest-cohort=()" always;
        add_header Content-Security-Policy-Report-Only $csp_report_only always;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Health check
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
