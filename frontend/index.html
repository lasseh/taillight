<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taillight</title>
    <meta name="description" content="Real-time syslog and application log viewer for network operations. Stream logs to your browser with a single Go binary and PostgreSQL." />
    <script>
      const t = localStorage.getItem('taillight-theme')
      if (t && t !== 'tokyonight') document.documentElement.dataset.theme = t
    </script>
  </head>
  <body class="theme-dark">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
