#############################
# Severity Rewrites
# Downgrade noisy events that report at a misleadingly high severity.
# Uses set $syslogseverity to modify the severity before DB insertion.
# Must run before 40-by-severity.conf so the rewritten value is stored.
#############################

# ESWD_DAI_FAILED: DAI (Dynamic ARP Inspection) violations on access
# ports are routine — downgrade from alert(1) to notice(5).
if ($msgid == "ESWD_DAI_FAILED") then {
    set $syslogseverity = 5;
}
