# --- fw1.h6 (SRX300): benign sp-0/0/0 CoS / jdhcpd reap noise ---
# These ERR-severity messages have no msgid and programname "-"/"jdhcpd",
# so msgid/programname filters can't catch them, and they contain
# "failed" so the generic safety-net keywords would keep them.
# Confirmed cosmetic via `show security flow status`, `show interfaces
# sp-0/0/0 extensive` (link up, stable 5+ weeks, zero errors) and
# `show class-of-service interface` (no custom scheduler-maps -- pure
# defaults). sp-0/0/0 is the internal services PIC: it has no real
# output queues, so Junos's CoS manager fails to compute scheduler
# params for it after an internal "media speed change" event. No
# traffic or security impact -- it is log noise only.
#
# Scoped to this host AND the sp-0/0/0 / reap signatures so a genuine
# CoS failure on a physical interface or a real jdhcpd fault still
# passes through. The absence of a safety-net keyword check is
# intentional -- these are known-benign despite containing "failed".
if ($hostname == "fw1.h6") then {
    # jdhcpd child-reaping race (ECHILD) -- not a DHCP failure
    if ($programname == "jdhcpd" and
        $msg contains "waitpid failed" and
        $msg contains "No child processes") then { stop }

    # fwdd: no output-queue entry for the services PIC
    if ($msg contains "fwdd_ifd_set_eff_bandwidth: can't find outq ifd entry for ifd sp-0/0/0") then { stop }

    # cosman: cannot derive subunit bandwidth for the services PIC
    if ($msg contains "cosman_compute_install_sched_params: Failed to get subunit b/w for sp-0/0/0") then { stop }

    # cosman: scheduler-policy update fails for sp-0/0/0 (ifd index varies)
    if ($msg contains "cosman_update_sched_policy_for_ifd" and
        $msg contains "(sp-0/0/0)") then { stop }

    # cosman: media-speed-change CoS reprogramming for the services PIC
    if ($msg contains "COSMAN: media speed change cos policy update failed") then { stop }
}
