#############################
# MSGID-Based Filters (Event Name)
# Primary filter: $msgid is parsed from RFC 5424 header, exact match
# Fastest and most precise method for event name filtering
#
# Exception keywords use re_match(tolower($msg), ...) for case-insensitive
# matching -- POSIX ERE (rsyslog default) does not support (?i)
#############################

# --- Chassis hardware noise ---
if ($msgid == "CHASSISD_BLOWERS_SPEED" or
    $msgid == "CHASSISD_TEMP_ZONE" or
    $msgid == "CHASSISD_FAN" or
    $msgid == "CHASSISD_PSU" or
    $msgid == "CHASSISD_SENSORS") then {
    if (not re_match(tolower($msg), "major|critical|alarm|failed")) then { stop }
}

# --- RPD scheduler noise ---
if ($msgid == "RPD_SCHED_CALLBACK" or
    $msgid == "RPD_SCHED_MODULE_INFO") then { stop }

# RPD schedule slips can indicate control-plane overload -- keep errors
if ($msgid == "RPD_SCHED_SLIP") then {
    if (not re_match(tolower($msg), "slip|overrun|error|behind")) then { stop }
}

# --- RT_FLOW session logs (SRX firewall) ---
# Drop session create/close, keep denies and errors
if ($msgid == "RT_FLOW_SESSION_CREATE" or
    $msgid == "RT_FLOW_SESSION_CLOSE") then {
    if (not re_match(tolower($msg), "deny|error")) then { stop }
}

# --- SNMP traps and auth failures ---
if ($msgid == "SNMPD_TRAP_COLD_START" or
    $msgid == "SNMPD_TRAP_WARM_START" or
    $msgid == "SNMPD_AUTH_FAILURE" or
    $msgid == "SNMPD_TRAP_QUEUE") then { stop }

# --- Login/logout ---
# Kept for audit trail -- all logins and logouts are logged
# if ($msgid == "UI_LOGIN_EVENT" or
#     $msgid == "UI_LOGOUT_EVENT") then {
#     if (not re_match(tolower($msg), "fail|invalid")) then { stop }
# }

# --- Config mode noise ---
# Drop routine config audit; keep errors/failures for audit trail.
# To log ALL config changes, uncomment the action below to route
# UI_CFG_AUDIT_SET to a separate audit log:
# if ($msgid == "UI_CFG_AUDIT_SET") then {
#     action(type="omfile"
#         file="/var/log/network/audit.log"
#         template="NetworkDeviceFormat"
#         fileCreateMode="0644"
#         dirCreateMode="0755"
#     )
# }
if ($msgid == "UI_CFG_AUDIT_SET" or
    $msgid == "UI_CMDLINE_READ_LINE" or
    $msgid == "UI_CONFIGURATION_MODE") then {
    if (not re_match(tolower($msg), "error|fail|denied")) then { stop }
}

# --- Management daemon routine login/auth ---
if ($msgid == "UI_DBASE_LOGIN_EVENT" or
    $msgid == "UI_AUTH_EVENT" or
    $msgid == "UI_AUTH_INVALID_CHALLENGE") then {
    if (not re_match(tolower($msg), "fail|error|denied")) then { stop }
}

# --- LLDP discovery ---
# Drop routine neighbor-up events; keep neighbor-down (operationally significant)
if ($msgid == "LLDP_NEIGHBOR_UP") then {
    if (not re_match(tolower($msg), "error")) then { stop }
}

# --- PFE stats ---
if ($msgid == "PFED_FW_SYSLOG_IP" or
    $msgid == "PFED_FW_SYSLOG_IP6" or
    $msgid == "PFE_FW_SYSLOG") then {
    if (not re_match(tolower($msg), "error|fail|critical")) then { stop }
}

# --- Interface statistics (not state changes) ---
if ($msgid == "IFINFO" and $msg contains "statistics") then { stop }

# --- License routine checks ---
if ($msgid startswith "LICENSE_" and
    not re_match(tolower($msg), "expir|invalid")) then { stop }

# --- BGP routine updates (keep state changes) ---
if ($msgid == "BGP_CONNECT" or
    $msgid == "BGP_READ" or
    $msgid == "BGP_WRITE" or
    $msgid == "BGP_SEND" or
    $msgid == "BGP_RECV") then {
    if (not re_match(tolower($msg), "established|down|error|notification")) then { stop }
}

# --- Kernel routine messages ---
if ($msgid == "IF_FLAGS_SNMP" or
    $msgid startswith "JNX_" or
    $msgid startswith "COS_" or
    $msgid startswith "PFE_") then {
    if (not re_match(tolower($msg), "panic|error|fail|critical|down|trap")) then { stop }
}

# --- SRX services-PIC (sp-0/0/0) CoS / jdhcpd reap noise ---
# Benign Junos noise emitted by branch SRX (SRX300/320/340/345).
# These ERR-severity messages have no msgid and programname "-"/"jdhcpd",
# so the msgid/programname filters above can't catch them, and they
# contain "failed" so the generic safety-net keywords would keep them.
# sp-0/0/0 is the internal services PIC: it has no real output queues,
# so Junos's CoS manager fails to compute scheduler params for it after
# an internal "media speed change" event (confirmed cosmetic via
# `show security flow status`, `show interfaces sp-0/0/0 extensive`,
# `show class-of-service interface`). No traffic or security impact.
#
# Not host-scoped -- this signature is the same benign noise on every
# branch SRX. Scoped instead to the sp-0/0/0 / reap signatures so a
# genuine CoS failure on a physical interface or a real jdhcpd fault
# still passes through. The absence of a safety-net keyword check is
# intentional -- these are known-benign despite containing "failed".

# jdhcpd child-reaping race (ECHILD) -- not a DHCP failure
if ($programname == "jdhcpd" and
    $msg contains "waitpid failed" and
    $msg contains "No child processes") then { stop }

# fwdd: no output-queue entry for the services PIC
if ($msg contains "fwdd_ifd_set_eff_bandwidth: can't find outq ifd entry for ifd sp-0/0/0") then { stop }

# cosman: cannot derive subunit bandwidth for the services PIC
if ($msg contains "cosman_compute_install_sched_params: Failed to get subunit b/w for sp-0/0/0") then { stop }

# cosman: scheduler-policy update fails for sp-0/0/0 (ifd index varies)
if ($msg contains "cosman_update_sched_policy_for_ifd" and
    $msg contains "(sp-0/0/0)") then { stop }

# cosman: media-speed-change CoS reprogramming for the services PIC
if ($msg contains "COSMAN: media speed change cos policy update failed") then { stop }

# --- EX4100-F phantom power-supply failure traps ---
# Known Junos firmware flaw on the compact EX4100-F models
# (EX4100-F-12T / EX4100-F-12P). These ship with a SINGLE external
# power adapter (75 W / 280 W) -- only "Power Supply 0 @ 0/0/*" is
# real. chassisd misreads every absent redundant PEM as a failed
# supply and emits bogus jnxPowerSupplyFailure traps, wrapped in
# syslog as CHASSISD_SNMP_TRAP6 at severity notice, e.g.:
#   "Power Supply failed (... jnxContentsDescr Power Supply 1 @ 0/1/*,
#    jnxOperatingState 6)"
#   "Power Supply failed (... jnxContentsDescr Power Supply 2 @ 0/2/*,
#    jnxOperatingState 6)"
# Observed for BOTH phantom slots (PSU 1 and PSU 2), repeated, on
# every affected switch. jnxOperatingState 6 = "down".
#
# Juniper has acknowledged this as a flaw. It is NOT fixable on the
# device: `chassis alarm fru-absence/pem-absence ignore` only gates
# the chassis alarm object, not chassisd's separate SNMP-trap path,
# so the trap/syslog keeps firing. No traffic or power impact -- the
# switch runs normally on its single adapter.
#
# Matches any non-zero phantom PEM ("Power Supply <N>= 1.. @ 0/<N>/*")
# so all repeated phantom slots are caught, while a real failure of
# the actual supply ("Power Supply 0 @ 0/0/*") still passes through.
# Not host-scoped -- same flaw on every EX4100-F. No safety-net
# keyword check is intentional (these all say "failed").
#
# CAVEAT: on a genuine multi-PSU chassis a real slot >=1 failure
# would also match. The affected fleet is single-adapter EX4100-F
# (no real redundant PSU), so this is acceptable; if real dual-PSU
# switches join this pipeline, add a hostname guard here.
if ($programname == "chassisd" and
    $msgid == "CHASSISD_SNMP_TRAP6" and
    $msg contains "Power Supply failed" and
    re_match($msg, "Power Supply [1-9][0-9]* @ 0/[1-9][0-9]*/[*]")) then { stop }

# --- Branch SRX internal static-MAC next-hop walker warning ---
# Cosmetic kernel (programname "-") WARNING on branch SRX:
#   mtj_nh_ucast_process_static_mac: Invalid subtype 2 or NULL
#   underlying_ifl_index 0(flags 0x0)
# The Marvell-ASIC NH driver (mtj_) periodically walks an internally
# auto-generated static-MAC next-hop tied to a host-internal pseudo
# interface (irb/vtep/esi/rbeb etc.) whose underlying IFL legitimately
# has index 0. Verified NOT a config issue: the affected SRX runs pure
# L3/flow with zero static-mac and zero ethernet-switching config
# (`show configuration | match static-mac` empty, no ethernet-switching
# /bridge hierarchy). No forwarding or security impact -- recurs every
# few minutes on the NH table re-walk. Not config-fixable (no relevant
# config exists), same family as the sp-0/0/0 CoS noise above.
#
# The function name alone is unique enough; not host-scoped (same
# internal behaviour on every branch SRX). No safety-net keyword check
# is intentional -- benign despite "Invalid"/"NULL".
if ($msg contains "mtj_nh_ucast_process_static_mac") then { stop }
