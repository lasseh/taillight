#############################
# Operational Logging
# Routes rsyslog health info to /dev/stdout (docker logs)
#############################

# Human-readable format for internal messages and MARK heartbeats
template(name="OperationalFormat" type="string"
    string="%timereported:::date-rfc3339% [rsyslog] %syslogseverity-text% %msg%\n"
)

# Compact one-line format for impstats JSON output
# Extracts key fields: origin, name, submitted, enqueued, discarded, queue size
template(name="StatsFormat" type="string"
    string="%timereported:::date-rfc3339% [stats] %$!origin% name=%$!name% submitted=%$!submitted% enqueued=%$!enqueued% discarded.full=%$!discarded.full% discarded.nf=%$!discarded.nf% size=%$!size% maxqsize=%$!maxqsize%\n"
)

# Ruleset for impstats output -- filters idle components, writes active stats
ruleset(name="operational_stats") {
    # Parse the JSON stats message into structured data
    action(type="mmjsonparse" name="parse_stats")

    # PostgreSQL stats output (uncommented by Dockerfile)
    # action(type="ompgsql"
    #     name="stats_to_pgsql"
    #     server="127.0.0.1"
    #     port="5432"
    #     db="taillight"
    #     uid="taillight"
    #     pwd="changeme"
    #     template="PgSQLStatsInsert"
    #     queue.type="LinkedList"
    #     queue.size="5000"
    #     queue.dequeueBatchSize="32"
    #     action.resumeRetryCount="-1"
    #     action.resumeInterval="30"
    # )

    # Only log components with actual activity (submitted > 0, size > 0, or discards)
    if ($!submitted > 0 or $!size > 0 or $!discarded.full > 0) then {
        action(type="omfile" file="/dev/stdout" template="StatsFormat")
    }
}
