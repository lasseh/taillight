#############################
# Input Listeners
#############################

# Standard UDP syslog (port 514) — IPv4
# Rate limiting disabled: rsyslog 8.2504 imudp ratelimiter bug strips
# $programname from RFC 5424 messages when ratelimit.interval > 0.
input(type="imudp"
    port="514"
    address="0.0.0.0"
    ruleset="network_devices"
    ratelimit.interval="0"
)

# Standard UDP syslog (port 514) — IPv6 (same ratelimit bug as above)
input(type="imudp"
    port="514"
    address="::"
    ruleset="network_devices"
    ratelimit.interval="0"
)

# Standard TCP syslog (port 514) — IPv4
# maxSessions prevents fd exhaustion from misbehaving devices or scanners
input(type="imtcp"
    port="514"
    address="0.0.0.0"
    ruleset="network_devices"
    maxSessions="200"
)

# Standard TCP syslog (port 514) — IPv6
input(type="imtcp"
    port="514"
    address="::"
    ruleset="network_devices"
    maxSessions="200"
)

# High-performance UDP (port 1514) — IPv4 (same ratelimit bug as above)
input(type="imudp"
    port="1514"
    address="0.0.0.0"
    ruleset="network_devices"
    ratelimit.interval="0"
)

# High-performance UDP (port 1514) — IPv6 (same ratelimit bug as above)
input(type="imudp"
    port="1514"
    address="::"
    ruleset="network_devices"
    ratelimit.interval="0"
)
