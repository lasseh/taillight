#############################
# Input Listeners
#############################

# Standard UDP syslog (port 514) — IPv4
# Flood protection: allow 20000 msgs/5s burst, then rate-limit
input(type="imudp"
    port="514"
    address="0.0.0.0"
    ruleset="network_devices"
    ratelimit.interval="5"
    ratelimit.burst="20000"
)

# Standard UDP syslog (port 514) — IPv6
input(type="imudp"
    port="514"
    address="::"
    ruleset="network_devices"
    ratelimit.interval="5"
    ratelimit.burst="20000"
)

# Standard TCP syslog (port 514) — IPv4
# maxSessions prevents fd exhaustion from misbehaving devices or scanners
input(type="imtcp"
    port="514"
    address="0.0.0.0"
    ruleset="network_devices"
    maxSessions="200"
)

# Standard TCP syslog (port 514) — IPv6
input(type="imtcp"
    port="514"
    address="::"
    ruleset="network_devices"
    maxSessions="200"
)

# High-performance UDP (port 1514) — IPv4
# Rate limiting disabled for dedicated high-throughput sources
input(type="imudp"
    port="1514"
    address="0.0.0.0"
    ruleset="network_devices"
    ratelimit.interval="0"
)

# High-performance UDP (port 1514) — IPv6
input(type="imudp"
    port="1514"
    address="::"
    ruleset="network_devices"
    ratelimit.interval="0"
)
