#############################
# Module Loading
#############################

# UDP syslog input (primary for network devices)
module(load="imudp" threads="8" batchSize="128")

# TCP syslog input (reliable delivery)
module(load="imtcp")

# Unix socket -- receives local system logs via /dev/log.
# Disabled in Docker: container runs as non-root and only handles network
# syslog. Internal messages route via processInternalMessages="on" without
# needing a Unix socket.
# module(load="imuxsock")

# Mark messages -- writes "-- MARK --" every interval (seconds) to prove
# rsyslog is alive and log flow hasn't silently stopped.
# Useful for monitoring and verifying log pipeline health.
# module(load="immark" interval="300")

# Program output (for local LibreNMS syslog.php)
module(load="omprog")

# PostgreSQL output
# Requires: rsyslog-pgsql package
module(load="ompgsql")

# Parse RFC 5424 structured data into JSON tree
module(load="mmpstrucdata")

# Parse JSON in message body into structured data ($! tree)
# Used by operational_stats ruleset to extract impstats fields
module(load="mmjsonparse")

# Sanitize non-UTF8 bytes in message fields.
# Network devices (Juniper, Cisco, etc.) can emit non-UTF8 syslog.
# PostgreSQL rejects invalid byte sequences, so fix them before output.
module(load="mmutf8fix")

# Statistics -- periodic throughput counters routed to operational_stats ruleset.
# Counters reset each interval so values represent per-minute deltas.
# The operational_stats ruleset (03-operational-logging.conf) filters idle
# components and writes active stats to /dev/stdout (docker logs).
module(load="impstats"
    interval="60"
    format="json"
    resetCounters="on"
    log.syslog="on"
    ruleset="operational_stats"
)
