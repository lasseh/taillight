#############################
# Output Destinations
#############################

# Critical severity output -- captures sev <= 2 (crit, alert, emerg)
ruleset(name="output_critical") {
    if ($syslogseverity <= 2) then {
        action(type="omfile"
            file="/var/log/network/critical_logs.log"
            template="NetworkDeviceFormat"
            asyncWriting="on"
            flushOnTXEnd="on"
            fileCreateMode="0644"
            dirCreateMode="0755"
        )
    }
}

# Local file output -- per-host log files
ruleset(name="output_local") {
    action(type="omfile"
        DynaFile="PerHostFile"
        template="NetworkDeviceFormat"
        asyncWriting="on"
        flushOnTXEnd="off"
        ioBufferSize="64k"
        flushInterval="1"
        dirCreateMode="0755"
        fileCreateMode="0644"
    )
}

# Remote forwarding via UDP (to central collector)
ruleset(name="output_remote") {
    action(type="omfwd"
        target="syslog-collector.example.com"
        port="514"
        protocol="udp"
        template="NetworkDeviceFormat"
        queue.type="LinkedList"
        queue.size="5000"
        queue.filename="fwd_remote"
        queue.maxDiskSpace="1g"
        queue.saveOnShutdown="on"
        action.resumeRetryCount="-1"
        action.resumeInterval="30"
    )
}

# Remote forwarding via TCP (reliable, with disk-assisted queue)
ruleset(name="output_remote_tcp") {
    action(type="omfwd"
        target="syslog-collector.example.com"
        port="6514"
        protocol="tcp"
        template="NetworkDeviceFormat"
        TCP_Framing="octet-counted"
        queue.type="LinkedList"
        queue.size="5000"
        queue.filename="fwd_remote_tcp"
        queue.maxDiskSpace="2g"
        queue.saveOnShutdown="on"
        action.resumeRetryCount="-1"
        action.resumeInterval="30"
    )
}

# LibreNMS local integration (omprog -> syslog.php on this server)
ruleset(name="output_librenms") {
    action(type="omprog"
        binary="/opt/librenms/syslog.php"
        template="LibreNMSFormat"
        queue.type="LinkedList"
        queue.size="5000"
        queue.workerThreads="2"
        queue.filename="librenms_omprog"
        queue.maxDiskSpace="500m"
        queue.saveOnShutdown="on"
        action.resumeRetryCount="-1"
        action.resumeInterval="30"
    )
}

# JSON output (for Elasticsearch/Graylog/Loki)
ruleset(name="output_json") {
    action(type="omfile"
        file="/var/log/network/syslog.json"
        template="JSONFormat"
        asyncWriting="on"
        flushOnTXEnd="off"
        ioBufferSize="64k"
        flushInterval="1"
    )
}

# PostgreSQL output (for live log viewer SSE backend)
# See README.md "PostgreSQL output" section for DDL, indexes, retention,
# TimescaleDB upgrade path, LISTEN/NOTIFY trigger, and storage estimates.
#
# Default credentials match docker-compose.yml defaults.
# For production, override via company-specific conf.d/ volume mount.
ruleset(name="output_pgsql") {
    action(type="ompgsql"
        name="syslog_to_pgsql"
        server="postgres"
        port="5432"
        db="taillight"
        uid="taillight"
        pwd="taillight"
        template="PgSQLInsert"

        # Disk-assisted LinkedList queue
        queue.type="LinkedList"
        queue.size="50000"
        queue.filename="pgsql_queue"
        queue.maxDiskSpace="2g"
        queue.saveOnShutdown="on"
        queue.checkpointInterval="1000"

        # Batching -- wraps dequeueBatchSize INSERTs per transaction
        queue.dequeueBatchSize="128"
        queue.workerThreads="4"

        # Infinite retry with 30s backoff
        action.resumeRetryCount="-1"
        action.resumeInterval="30"
    )
}