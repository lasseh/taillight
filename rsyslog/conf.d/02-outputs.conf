# PostgreSQL output for srvlog events (live log viewer SSE backend).
# See README.md "PostgreSQL output" section for DDL, indexes, retention,
# TimescaleDB upgrade path, LISTEN/NOTIFY trigger, and storage estimates.
#
# Default credentials match docker-compose.yml defaults.
# For production, override via company-specific conf.d/ volume mount.
ruleset(name="output_pgsql_srvlog") {
    action(type="ompgsql"
        name="srvlog_to_pgsql"
        server="postgres"
        port="5432"
        db="taillight"
        uid="taillight"
        pwd="taillight"
        template="PgSQLSrvlogInsert"

        # Disk-assisted LinkedList queue
        queue.type="LinkedList"
        queue.size="50000"
        queue.filename="pgsql_srvlog_queue"
        queue.maxDiskSpace="2g"
        queue.saveOnShutdown="on"
        queue.checkpointInterval="1000"

        # Batching -- wraps dequeueBatchSize INSERTs per transaction
        queue.dequeueBatchSize="128"
        queue.workerThreads="4"

        # Infinite retry with 30s backoff
        action.resumeRetryCount="-1"
        action.resumeInterval="30"
    )
}

# PostgreSQL output for netlog events (network device logs).
# Same queue configuration as srvlog but targets the netlog_events table.
ruleset(name="output_pgsql_netlog") {
    action(type="ompgsql"
        name="netlog_to_pgsql"
        server="postgres"
        port="5432"
        db="taillight"
        uid="taillight"
        pwd="taillight"
        template="PgSQLNetlogInsert"

        # Disk-assisted LinkedList queue
        queue.type="LinkedList"
        queue.size="50000"
        queue.filename="pgsql_netlog_queue"
        queue.maxDiskSpace="2g"
        queue.saveOnShutdown="on"
        queue.checkpointInterval="1000"

        # Batching -- wraps dequeueBatchSize INSERTs per transaction
        queue.dequeueBatchSize="128"
        queue.workerThreads="4"

        # Infinite retry with 30s backoff
        action.resumeRetryCount="-1"
        action.resumeInterval="30"
    )
}