#############################
# Output Templates
#############################

# Standard syslog format with high-resolution timestamp
template(name="NetworkDeviceFormat" type="string"
    string="%timereported:::date-rfc3339% %fromhost-ip% %hostname% %syslogtag% %msg%\n"
)

# Traditional syslog format (compatible with most log parsers)
template(name="TraditionalFormat" type="string"
    string="%timereported% %hostname% %syslogtag% %msg%\n"
)

# JSON output (for Elasticsearch, Graylog, etc.)
# All string properties use format="jsonr" to escape special characters
template(name="JSONFormat" type="list") {
    constant(value="{")
    constant(value="\"@timestamp\":\"")     property(name="timereported" dateFormat="rfc3339")
    constant(value="\",\"host\":\"")        property(name="hostname" format="jsonr")
    constant(value="\",\"fromhost_ip\":\"") property(name="fromhost-ip" format="jsonr")
    constant(value="\",\"program\":\"")     property(name="$.prog" format="jsonr")
    constant(value="\",\"msgid\":\"")       property(name="msgid" format="jsonr")
    constant(value="\",\"severity\":\"")    property(name="syslogseverity-text" format="jsonr")
    constant(value="\",\"facility\":\"")    property(name="syslogfacility-text" format="jsonr")
    constant(value="\",\"tag\":\"")         property(name="syslogtag" format="jsonr")
    constant(value="\",\"structured_data\":\"") property(name="structured-data" format="jsonr")
    constant(value="\",\"message\":\"")     property(name="msg" format="jsonr")
    constant(value="\"}\n")
}

# Per-host dynamic filename template
template(name="PerHostFile" type="string"
    string="/var/log/network/%hostname%.log"
)

# Commit log -- hostname with domain suffix, tag, and message
template(name="CommitFormat" type="string"
    string="%hostname%.osl.as207788.net %syslogtag% %msg%\n"
)

# Resin trigger -- hostname, source IP, and message
template(name="ResinTemplate" type="string"
    string="%hostname% %fromhost-ip% %msg%\n"
)

# LibreNMS local syslog.php input format (pipe-delimited)
template(name="LibreNMSFormat" type="string"
    string="%fromhost%||%syslogfacility%||%syslogpriority%||%syslogseverity%||%syslogtag%||%$year%-%$month%-%$day% %timegenerated:8:25%||%msg%||%programname%\n"
)

# Debug template -- all parsed fields, one block per message
template(name="DebugFields" type="string"
    string="---\nTIME:       %timereported:::date-rfc3339%\nFROM_IP:    %fromhost-ip%\nFROM_HOST:  %fromhost%\nHOSTNAME:   %hostname%\nPROGRAM:    %programname%\nTAG:        %syslogtag%\nPID:        %procid%\nMSGID:      %msgid%\nFACILITY:   %syslogfacility% (%syslogfacility-text%)\nSEVERITY:   %syslogseverity% (%syslogseverity-text%)\nPRI:        %pri% (%pri-text%)\nAPP_NAME:   %app-name%\nSD:         %structured-data%\nINPUT:      %inputname%\nMSG:        %msg%\n\n"
)

# Oxidized webhook -- hostname, event, user, and timestamp
# All string properties use format="jsonr" to escape special characters
template(name="OxidizedJSON" type="list") {
    constant(value="{\"hostname\":\"")
    property(name="hostname" format="jsonr")
    constant(value="\",\"event\":\"")
    property(name="msgid" format="jsonr")
    constant(value="\",\"user\":\"")
    property(name="$!rfc5424-sd!junos@2636.1.1.1.2.18!username" format="jsonr")
    constant(value="\",\"timestamp\":\"")
    property(name="timereported" dateFormat="rfc3339")
    constant(value="\"}\n")
}

# PostgreSQL INSERT template (for live log viewer SSE backend)
# Uses option.stdsql="on" which doubles single-quotes ('') for PostgreSQL.
# Do NOT use option.sql="on" -- that applies MySQL-style backslash escaping.
# raw_message is reconstructed from parsed header fields + sanitized $msg
# because mmutf8fix can only target the msg property, and $rawmsg may
# contain invalid UTF-8 that PostgreSQL would reject.
# Header fields (PRI, timestamp, hostname, tag) are safe ASCII.
#
# PostgreSQL INSERT template for impstats (rsyslog internal metrics)
# Captures the full JSON stats payload into the rsyslog_stats table.
# Uses $!all-json to get the complete parsed impstats object.
#
template(name="PgSQLStatsInsert" type="list" option.stdsql="on") {
    constant(value="INSERT INTO rsyslog_stats (collected_at, origin, name, stats) VALUES ('")
    property(name="timegenerated" dateFormat="rfc3339")
    constant(value="','")
    property(name="$!origin")
    constant(value="','")
    property(name="$!name")
    constant(value="','")
    property(name="$!all-json")
    constant(value="')")
}

template(name="PgSQLInsert" type="list" option.stdsql="on") {
    constant(value="INSERT INTO syslog_events (received_at, reported_at, hostname, fromhost_ip, programname, msgid, severity, facility, syslogtag, structured_data, message, raw_message) VALUES ('")
    property(name="timegenerated"   dateFormat="rfc3339")
    constant(value="','")
    property(name="timereported"    dateFormat="rfc3339")
    constant(value="','")
    property(name="hostname")
    constant(value="','")
    property(name="fromhost-ip")
    constant(value="','")
    property(name="$.prog")
    constant(value="','")
    property(name="msgid")
    constant(value="',")
    property(name="syslogseverity")
    constant(value=",")
    property(name="syslogfacility")
    constant(value=",'")
    property(name="syslogtag")
    constant(value="','")
    property(name="structured-data")
    constant(value="','")
    property(name="msg")
    constant(value="','<")
    property(name="pri")
    constant(value=">")
    property(name="timereported" dateFormat="rfc3339")
    constant(value=" ")
    property(name="hostname")
    constant(value=" ")
    property(name="syslogtag")
    property(name="msg")
    constant(value="')")
}
