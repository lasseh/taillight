#############################
# rsyslog.conf -- Main Configuration
# Network device syslog with Juniper filtering
#############################

# Global settings
# rsyslog errors to stderr (visible in docker logs)
$ErrorMessagesToStderr on

global(
    maxMessageSize="64k"
    preserveFQDN="on"
    processInternalMessages="on"
    workDirectory="/var/spool/rsyslog"
)

# Main message queue -- tuned for high-volume network syslog
main_queue(
    queue.type="LinkedList"
    queue.filename="main_queue"
    queue.size="50000"
    queue.discardMark="45000"
    queue.discardSeverity="6"          # Discard info/debug first under pressure
    queue.workerThreads="4"
    queue.workerThreadMinimumMessages="5000"
    queue.timeoutEnqueue="0"           # Non-blocking enqueue
    queue.maxDiskSpace="5g"            # Disk-assisted queue for overflow
    queue.saveOnShutdown="on"
)

# Include modular configuration files (order matters)
include(file="/etc/rsyslog.d/conf.d/00-modules.conf")
include(file="/etc/rsyslog.d/conf.d/01-templates.conf")
include(file="/etc/rsyslog.d/conf.d/02-outputs.conf")
include(file="/etc/rsyslog.d/conf.d/03-operational-logging.conf")
include(file="/etc/rsyslog.d/conf.d/10-inputs.conf")
include(file="/etc/rsyslog.d/conf.d/20-ruleset.conf")

#############################
# Default ruleset -- internal messages
# rsyslog internal messages land here (via processInternalMessages="on")
# because they are not bound to the network_devices ruleset.
#############################

# Discard health check probe messages (docker compose healthcheck)
if $programname == "healthcheck" then stop

# rsyslog internal messages and MARK heartbeats to stdout (docker logs)
syslog.*    action(type="omfile" file="/dev/stdout" template="OperationalFormat")
# mark.*      action(type="omfile" file="/dev/stdout" template="OperationalFormat")

# Local file outputs disabled in Docker: container runs as non-root
# and these paths are not useful. All local messages go to stdout below.

# Docker: also send all local messages to stdout so they appear in docker logs
*.*;mark.none;syslog.none       action(type="omfile" file="/dev/stdout" template="OperationalFormat")
