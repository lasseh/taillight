#############################
# Taillight Client — Linux Server
#############################
#
# Real-world rsyslog config for forwarding logs from a Linux server
# to a Taillight collector. Ships only what matters, drops the noise.
#
# Install:
#   sudo cp client-forwarding.conf /etc/rsyslog.d/60-taillight.conf
#   sudo sed -i 's/TAILLIGHT_HOST/10.0.0.5/' /etc/rsyslog.d/60-taillight.conf
#   sudo systemctl restart rsyslog
#
# Test:
#   logger -p auth.warning -t sshd "Failed password for root from 192.168.1.100"
#   logger -p kern.err -t kernel "Out of memory: Killed process 1234 (java)"
#
# What gets forwarded:
#   - Warning and above (sev 0-4): warning, error, critical, alert, emergency
#
# What gets dropped:
#   - Notice (sev 5) and info (sev 6) from all programs
#   - Debug (sev 7)
#   - Known noise (even at warning+): cron, DHCP, NTP, NetworkManager, etc.
#   - Routine PAM session open/close for known services
#   - systemd slice/scope lifecycle spam
#   - rsyslog internal stats

# Use a dedicated ruleset so we don't interfere with local logging.
# Local /var/log/* files continue to work exactly as before.
ruleset(name="taillight") {

    # ---- Drop: noise we never want ----

    # Debug messages (severity 7) -- never useful remotely
    if ($syslogseverity == 7) then stop

    # rsyslog internal stats and housekeeping
    if ($programname == "rsyslogd") then stop

    # Routine cron execution logs (not errors -- those pass through below)
    if ($programname == "CRON" and $syslogseverity > 4) then stop

    # systemd session/slice/scope lifecycle spam
    if ($programname == "systemd" and $msg contains "Started Session") then stop
    if ($programname == "systemd" and $msg contains "Created slice") then stop
    if ($programname == "systemd" and $msg contains "Removed slice") then stop
    if ($programname == "systemd" and $msg contains "Starting User Slice") then stop
    if ($programname == "systemd" and $msg contains "Stopping User Slice") then stop

    # PAM routine session open/close (not failures)
    if ($programname == "systemd-logind" and $msg contains "New session") then stop
    if ($programname == "systemd-logind" and $msg contains "Removed session") then stop
    if ($msg contains "pam_unix" and $msg contains "session opened") then stop
    if ($msg contains "pam_unix" and $msg contains "session closed") then stop

    # NetworkManager routine state changes
    if ($programname == "NetworkManager" and $syslogseverity > 4) then stop

    # DHCP renewals
    if ($programname == "dhclient" and $syslogseverity > 4) then stop

    # NTP routine sync
    if ($programname == "ntpd" and $syslogseverity > 4) then stop
    if ($programname == "chronyd" and $syslogseverity > 4) then stop

    # Postfix queue statistics and routine delivery
    if ($programname == "postfix/qmgr" and $syslogseverity > 4) then stop
    if ($programname == "postfix/cleanup" and $syslogseverity > 4) then stop

    # Snapd routine refresh checks
    if ($programname == "snapd" and $syslogseverity > 4) then stop

    # ---- Forward: everything that survived the filters ----

    # Severity warning and above (sev 0-4) always ships, regardless of program
    if ($syslogseverity <= 4) then {
        call taillight_send
        stop
    }

    # Everything else (notice sev 5, info sev 6) is silently dropped.
    # To ship info/notice from a specific program, add a rule above the
    # severity check — e.g.:
    #   if ($programname == "sshd") then { call taillight_send stop }
}

# TCP output with disk-assisted queue.
# Survives collector restarts and network outages.
# Port 515 is for server syslog (srvlog). Port 514 is for network devices (netlog).
ruleset(name="taillight_send") {
    action(type="omfwd"
        target="TAILLIGHT_HOST"
        port="515"
        protocol="tcp"
        template="RSYSLOG_SyslogProtocol23Format"
        TCP_Framing="octet-counted"

        queue.type="LinkedList"
        queue.size="10000"
        queue.filename="taillight_fwd"
        queue.maxDiskSpace="500m"
        queue.saveOnShutdown="on"

        action.resumeRetryCount="-1"
        action.resumeInterval="30"
    )
}

# Hook into the default processing: after local logging, evaluate our ruleset.
# This uses a legacy-style filter that matches everything (*.*) and calls
# the taillight ruleset. Local log rules in /etc/rsyslog.conf and other
# /etc/rsyslog.d/ files are unaffected.
*.* call taillight
