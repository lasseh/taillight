services:
  postgres:
    image: timescale/timescaledb:latest-pg18
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb,pg_stat_statements"]
    environment:
      POSTGRES_DB: taillight
      POSTGRES_USER: taillight
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taillight}
    ports:
      # Host port is configurable; container always listens on 5432.
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - taillight
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taillight"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    ports:
      - "${API_HOST_PORT:-8080}:8080"
    environment:
      # DATABASE_URL uses the internal hostname "postgres" and port 5432.
      # These never change — only the host port (POSTGRES_HOST_PORT) is configurable.
      DATABASE_URL: postgres://taillight:${POSTGRES_PASSWORD:-taillight}@postgres:5432/taillight?sslmode=disable
      LISTEN_ADDR: ":8080"
    volumes:
      - ./api/config.yml:/config.yml:ro
    networks:
      - taillight
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  rsyslog:
    build: ./rsyslog
    ports:
      # Uses 1514 to avoid conflicts during development.
      # Change to 514 in production so devices can send to the standard syslog port.
      - "${RSYSLOG_HOST_PORT:-1514}:514/udp"
      - "${RSYSLOG_HOST_PORT:-1514}:514/tcp"
    environment:
      PGSQL_SERVER: ${PGSQL_SERVER:-postgres}
      PGSQL_PORT: ${PGSQL_PORT:-5432}
      PGSQL_DB: ${PGSQL_DB:-taillight}
      PGSQL_USER: ${PGSQL_USER:-taillight}
      PGSQL_PASSWORD: ${PGSQL_PASSWORD:-taillight}
    networks:
      - taillight
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "logger -t healthcheck test"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:80"
    environment:
      # API_URL is empty by default — the frontend uses relative URLs,
      # which works when nginx proxies both frontend and API on the same origin.
      # For local dev without a reverse proxy, set: API_URL=http://localhost:8080
      API_URL: ${API_URL:-}
    networks:
      - taillight
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:80/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Uncomment to test the full reverse proxy setup locally.
  # Routes all traffic through a single port (80) like production.
  # See docs/nginx-reverse-proxy.conf.example for the production TLS version.
  #
  # proxy:
  #   image: nginx:alpine
  #   ports:
  #     - "8090:80"
  #   volumes:
  #     - ./docs/nginx-reverse-proxy-docker.conf:/etc/nginx/conf.d/default.conf:ro
  #   networks:
  #     - taillight
  #   depends_on:
  #     - api
  #     - frontend

volumes:
  pgdata:

networks:
  taillight:
    driver: bridge
