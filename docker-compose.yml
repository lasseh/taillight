services:
  postgres:
    image: timescale/timescaledb:latest-pg18
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb,pg_stat_statements"]
    environment:
      POSTGRES_DB: taillight
      POSTGRES_USER: taillight
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taillight}
    ports:
      - "35432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taillight"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://taillight:${POSTGRES_PASSWORD:-taillight}@postgres:5432/taillight?sslmode=disable
      LISTEN_ADDR: ":8080"
    volumes:
      - ./api/config.yaml:/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  rsyslog:
    build: ./rsyslog
    ports:
      - "1514:514/udp"
      - "1514:514/tcp"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taillight}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "logger -t healthcheck test"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      - API_BACKEND=http://api:8080
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
