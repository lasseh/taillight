services:
  postgres:
    image: timescale/timescaledb:latest-pg18
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb,pg_stat_statements"]
    environment:
      POSTGRES_DB: taillight
      POSTGRES_USER: taillight
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taillight}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./api/migrations:/migrations:ro
      - ./api/docker/initdb.sh:/docker-entrypoint-initdb.d/initdb.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taillight"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://taillight:${POSTGRES_PASSWORD:-taillight}@postgres:5432/taillight?sslmode=disable
      LISTEN_ADDR: ":8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      - API_BACKEND=http://api:8080
    depends_on:
      - api

volumes:
  pgdata:
