services:
  postgres:
    image: timescale/timescaledb:latest-pg18
    command: ["postgres", "-c", "shared_preload_libraries=timescaledb,pg_stat_statements"]
    environment:
      POSTGRES_DB: taillight
      POSTGRES_USER: taillight
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taillight}
    ports:
      - "35432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taillight"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://taillight:${POSTGRES_PASSWORD:-taillight}@postgres:5432/taillight?sslmode=disable
      LISTEN_ADDR: ":8080"
    volumes:
      - ./api/config.yml:/config.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  rsyslog:
    build: ./rsyslog
    ports:
      # Uses 1514 to avoid conflicts during development.
      # Change to 514:514 for production so devices can send to the standard syslog port.
      - "1514:514/udp"
      - "1514:514/tcp"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "logger -t healthcheck test"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Uncomment to test the full reverse proxy setup locally.
  # Routes all traffic through a single port (80) like production.
  # See docs/nginx-reverse-proxy.conf.example for the production TLS version.
  #
  # proxy:
  #   image: nginx:alpine
  #   ports:
  #     - "8090:80"
  #   volumes:
  #     - ./docs/nginx-reverse-proxy-docker.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     - api
  #     - frontend

volumes:
  pgdata:
