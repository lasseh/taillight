# Taillight — example nginx reverse proxy with rate limiting
#
# Rate-limit the login endpoint to prevent brute-force attacks.
# Adjust the zone size and rate to match your expected traffic.

# Rate limit zones — keyed by client IP.
# login: 10 requests/minute (burst of 5 with delay).
# api:   30 requests/second  (burst of 50 with delay).
limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/s;

server {
    listen 443 ssl http2;
    server_name taillight.example.com;

    ssl_certificate     /etc/ssl/certs/taillight.pem;
    ssl_certificate_key /etc/ssl/private/taillight.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Forward the real client IP and protocol to the backend.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;

    # ── Auth: login endpoint — strict rate limit ──────────────────────
    location = /api/v1/auth/login {
        limit_req zone=login burst=5 delay=3;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8080;
    }

    # ── SSE streams — long-lived, no buffering ────────────────────────
    location ~ ^/api/v1/(syslog|applog)/stream$ {
        proxy_pass http://127.0.0.1:8080;

        proxy_buffering off;
        proxy_cache     off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;

        # Keep the connection alive for up to 24 h.
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── General API — moderate rate limit ─────────────────────────────
    location /api/v1/ {
        limit_req zone=api burst=50 delay=20;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8080;
    }

    # ── Frontend static files ─────────────────────────────────────────
    location / {
        root /var/www/taillight;
        try_files $uri $uri/ /index.html;
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name taillight.example.com;
    return 301 https://$host$request_uri;
}
