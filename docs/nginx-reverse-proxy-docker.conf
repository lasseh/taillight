# Taillight — docker-compose reverse proxy for local testing
#
# HTTP-only version of the production reverse proxy.
# Uses docker service names (api, frontend) instead of localhost.
# Uncomment the "proxy" service in docker-compose.yml to use this.

# ── Upstreams — change ports here, not in every location block ────
upstream taillight_api {
    server api:8080;
    keepalive 32;
}

upstream taillight_frontend {
    server frontend:80;
    keepalive 4;
}

limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/s;

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Proxy headers (inherited by all location blocks) ─────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Request-ID      $request_id;

    # TCP keepalive to detect dead backend connections
    proxy_socket_keepalive on;

    # ── Gzip ─────────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;
    gzip_vary on;

    # ── Auth: login endpoint — strict rate limit ─────────────────────
    location = /api/v1/auth/login {
        limit_req zone=login burst=5 delay=3;
        limit_req_status 429;

        proxy_pass http://taillight_api;
    }

    # ── SSE streams — long-lived, no buffering ───────────────────────
    # Only 4 directives beyond standard proxy: buffering off, long read
    # timeout, HTTP/1.1, and empty Connection header for keepalive.
    # Backend sends heartbeat comments every 30s to prevent read timeout.
    location ~ ^/api/v1/(syslog|applog)/stream$ {
        proxy_pass http://taillight_api;

        proxy_buffering            off;
        proxy_read_timeout         24h;
        proxy_http_version         1.1;
        proxy_set_header Connection "";
    }

    # ── General API — moderate rate limit ────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 delay=20;
        limit_req_status 429;

        proxy_pass http://taillight_api;
    }

    # ── Health check endpoint (no rate limit) ────────────────────────
    location = /health {
        proxy_pass http://taillight_api;
    }

    # ── Frontend ─────────────────────────────────────────────────────
    location / {
        proxy_pass http://taillight_frontend;
    }
}
