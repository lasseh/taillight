# Taillight — docker-compose reverse proxy for local testing
#
# HTTP-only version of the production reverse proxy.
# Uses docker service names (api, frontend) instead of localhost.
# Uncomment the "proxy" service in docker-compose.yml to use this.

limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/s;

server {
    listen 80;
    server_name localhost;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Common proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Gzip
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;

    # ── Auth: login endpoint — strict rate limit ──────────────────────
    location = /api/v1/auth/login {
        limit_req zone=login burst=5 delay=3;
        limit_req_status 429;

        proxy_pass http://api:8080;
    }

    # ── SSE streams — long-lived, no buffering ────────────────────────
    location ~ ^/api/v1/(syslog|applog)/stream$ {
        proxy_pass http://api:8080;

        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── General API — moderate rate limit ─────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 delay=20;
        limit_req_status 429;

        proxy_pass http://api:8080;
    }

    # ── Health check endpoint (no rate limit) ─────────────────────────
    location = /health {
        proxy_pass http://api:8080;
    }

    # ── Frontend (proxied to frontend container) ─────────────────────
    location / {
        proxy_pass http://frontend:80;
    }
}
